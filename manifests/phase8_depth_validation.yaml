      - "Make the Living Book application path lead with the RoPE certifier demo before broad AI scaffolding."
      - "Keep the README short and link to detailed docs instead of front-loading benchmark plumbing."
    artifact_refs:
      - "docs/PHASE8_DEPTH_VALIDATION.md"
      - "README.md"
      - "docs/ROPE_CERTIFIER_QUICKSTART.md"
      - "scripts/rope_certify.py"
      - "site/chapters/applications/rope_certifier.qmd"
      - "docs/LIVING_BOOK_ROADMAP.md"
    dictionary_dependencies: ["COMMON-0077"]
    next_action: "The dedicated quickstart exists and the RoPE page links it; next make the application landing path surface the certifier as the flagship AI contract and keep output examples synced with the schema."
    guardrail: "Do not hide assumptions or limitations to make the demo sound stronger."
