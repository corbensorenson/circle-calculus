targets:
  - id: P8-DEPTH-001
    area: "RoPE real-phase margin"
    priority: high
    status: active
    target_type: proof_program
    title: "Real RoPE phase-margin theorem program"
    question: "Can the RoPE certifier's numerical real-phase margin caveat become a theorem-backed quantitative bound?"
    ordinary_baseline: "Unchecked numerical phase scans and prose notes about RoPE aliasing or long-context scaling."
    acceptance_criteria:
      - "State a precise real-valued phase-distance object and distinguish it from the existing integer-period phase-bank model."
      - "Prove at least one quantitative lower-bound, nearest-convergent, or bounded-search precursor whose proof is more than definitional unfolding."
      - "Keep continued-fraction, three-distance, or Diophantine approximation dependencies explicit before claiming the full theorem."
      - "Update the RoPE paper, certifier output, and Living Book page only to the level justified by the proved theorem."
    artifact_refs:
      - "docs/PHASE8_DEPTH_VALIDATION.md"
      - "Circle/Applications/RoPECertifier.lean"
      - "papers/applications/PAPER_AI_04_ROPE_POSITION_CERTIFIER.md"
      - "circle_math/applications/rope_certifier.py"
      - "site/chapters/applications/rope_certifier.qmd"
      - "docs/ROPE_CERTIFIER_QUICKSTART.md"
      - "docs/ROPE_REAL_PHASE_MARGIN_NOTES.md"
    dictionary_dependencies: ["COMMON-0076", "COMMON-0077", "COMMON-0080", "COMMON-0082", "COMMON-0085", "COMMON-0086", "COMMON-0087", "COMMON-0088", "COMMON-0089"]
    next_action: "The real-phase RoPE spine now reaches AIRA-T0173: standard channel 0 is theorem-backed through 64k at margin 1/104219 and through 192k at margin 1/328459, with obstruction brackets at gap 710 and gap 103993. The generated D15/D16/D17/D18/D19 Lean source now uses compact uniform bands that store shared rational bounds once and attach them inside Lean before the existing rational-band proof bridge; generated coverage now proves a contiguous gap-chain certificate, and endpoint validity is checked on compact rows before reflection into expanded band validity. A larger D20 table was planner-audited but is not currently practical for normal local builds; next work should target broader channel-wise certificates, a full-bank transfer, faster native rational endpoint checking, finer generated-table chunking, or a continued-fraction bridge."
    frontier_note: "AIRA-T0139 through AIRA-T0141 provide the proved rational-band compression bridge, generated D15/D16/D17/D18/D19 certificates now compile for the 32k/64k/128k/160k/192k rows, and the generated source is compacted by uniform gap/cell bands with contiguous-coverage and compact-endpoint bridges. The remaining frontier is broader channel-wise or full-bank certification plus endpoint/proof-check speed, generated-table scalability, and continued-fraction depth."
    guardrail: "Do not present numerical margin scans as Lean-proved real RoPE theorems."

  - id: P8-DEPTH-002
    area: "Sparse attention coverage"
    priority: high
    status: active
    target_type: proof_program
    title: "Sparse-attention coverage iff and gap certificates"
    question: "Can local plus stride-family attention contracts characterize exactly which lags are covered, not just exhibit reachable lags?"
    ordinary_baseline: "Sparse-attention design notes that list reachable examples without a proof of coverage gaps."
    acceptance_criteria:
      - "Define a coverage predicate for local-window plus finite stride-family plans over a finite context and candidate budget."
      - "Prove an iff, converse, or no-gap/no-coverage statement that can identify missing lags."
      - "Emit Python certificates that list covered lags, uncovered lags, and candidate counts for fixed plans."
      - "Keep model-quality, long-context, throughput, and memory claims outside the theorem."
    artifact_refs:
      - "docs/PHASE8_DEPTH_VALIDATION.md"
      - "Circle/Applications/CircleTransformer.lean"
      - "papers/applications/PAPER_AI_02_COIL_ATTENTION_AND_MEMORY.md"
      - "sidecars/PAPER_AI_02_COIL_ATTENTION_AND_MEMORY/python/benchmark_stride_family_sparse_attention.py"
      - "sidecars/PAPER_AI_02_COIL_ATTENTION_AND_MEMORY/results/stride_family_sparse_attention.json"
      - "sidecars/PAPER_AI_02_COIL_ATTENTION_AND_MEMORY/results/stride_family_sparse_attention.md"
      - "site/chapters/applications/ai.qmd"
    dictionary_dependencies: ["COMMON-0075", "COMMON-0079"]
    next_action: "Gap-certificate iff, concrete no-local/no-stride-step gaps, dense-local no-gap, exact local-window threshold, family recursion, budget monotonicity, complete-coverage equivalence, raw budget, context-clipped deduplicated-budget, exact theorem-side lag-candidate membership, query-indexed candidate-list/count, no-collision equality contracts, structural no-collision sufficient conditions, a singleton no-wrap numeric sufficient condition, a compositional finite-family residue no-collision rule, a numeric no-wrap head/tail separation condition, an inductive ordered separated-family sufficient condition, separated-family local/coil plus full lag-candidate no-collision conditions, separated-family query no-collision plus exact raw-budget endpoints under predecessor injectivity, a numeric local-window-below-context predecessor-injectivity condition, raw-budget survival iff no-collision endpoints, a finite positive-lag range coverage iff, concrete default-plan gap/incomplete-coverage theorems for lag 5 in the C_120 local-window 4 path-length 3 strides [7,13] fixture, finite covered/uncovered-lag lists whose memberships match semantic sparse-plan hits/misses, default exact hit/gap counts, covered/uncovered list disjointness, covered-or-uncovered exhaustive membership, covered-plus-uncovered count partition, a covered-count complete-coverage iff, positive-uncovered-count, covered-count-shortfall, first-gap iff/head/semantic-miss bridges, a default first-gap fixture, and public fixture interval-summary certificates are now landed through AIT-T0020 through AIT-T0105 and COMMON-0079. The sidecar now emits text/JSON/Markdown result fixtures with compact covered-list, gap, theorem-backed first-gap head/completeness/miss, count-witness, covered-shortfall, no-collision, uncovered-list, interval-summary, budget fields, and planner-style rows for declared 4096/8192-context layouts with reproduce commands; next prefer further necessary-and-sufficient coverage/budget theorems over more planner rows unless a row exposes a new contract field."
    guardrail: "Do not confuse lag coverage with neural attention quality or runtime."

  - id: P8-DEPTH-003
    area: "Collision counting"
    priority: high
    status: active
    target_type: proof_program
    title: "Finite phase-bank collision counting"
    question: "Can the RoPE certifier count colliding position pairs, not only report the first collision?"
    ordinary_baseline: "Manual or brute-force scan over position pairs without theorem-backed counting."
    acceptance_criteria:
      - "Define colliding unordered or ordered pair counts for a finite context and period bank."
      - "Prove exact formulas for one-period banks and a tractable multi-period case, using gcd/lcm/CRT-style reasoning where appropriate."
      - "Update Python output to include theorem-cited collision counts and representative examples."
      - "Add tests comparing the formula to brute-force enumeration on bounded contexts."
    artifact_refs:
      - "docs/PHASE8_DEPTH_VALIDATION.md"
      - "Circle/Applications/RoPECertifier.lean"
      - "circle_math/applications/rope_certifier.py"
      - "tests/test_rope_certifier.py"
    dictionary_dependencies: ["COMMON-0076", "COMMON-0077", "COMMON-0078"]
    next_action: "The theorem-backed common-gap, common-gap-multiple, exact single-period, exact integer-bank collision-pair counts, single-period context threshold, single-period zero/positive count semantics, LCM pass/fail witnesses, count-zero boundary, count-positive iff collision-witness theorem, bounded prefix and selected-subfamily reports, representative prefix-pass/shared-factor/quantized/interpolation-style boundary diagnostic cases, prefix/subbank-to-full-bank no-collision bridges, and exact-only explicit period-bank CLI are now landed through AIRA-T0027, AIRA-T0028, AIRA-T0034, AIRA-T0035, AIRA-T0036, AIRA-T0046, AIRA-T0048, AIRA-T0049, AIRA-T0051, AIRA-T0052, AIRA-T0174 through AIRA-T0176, and AIRA-T0203 through AIRA-T0205; next consider richer subfamily-selection formulas, with brute-force Python parity for small contexts."
    guardrail: "Do not imply the finite integer-period count is a count of real-valued RoPE collisions unless the real model is separately formalized."

  - id: P8-VALID-001
