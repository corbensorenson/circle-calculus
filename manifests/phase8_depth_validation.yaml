targets:
  - id: P8-DEPTH-001
    area: "RoPE real-phase margin"
    priority: high
    status: active
    target_type: proof_program
    title: "Real RoPE phase-margin theorem program"
    question: "Can the RoPE certifier's numerical real-phase margin caveat become a theorem-backed quantitative bound?"
    ordinary_baseline: "Unchecked numerical phase scans and prose notes about RoPE aliasing or long-context scaling."
    acceptance_criteria:
      - "State a precise real-valued phase-distance object and distinguish it from the existing integer-period phase-bank model."
      - "Prove at least one quantitative lower-bound, nearest-convergent, or bounded-search precursor whose proof is more than definitional unfolding."
      - "Keep continued-fraction, three-distance, or Diophantine approximation dependencies explicit before claiming the full theorem."
      - "Update the RoPE paper, certifier output, and Living Book page only to the level justified by the proved theorem."
    artifact_refs:
      - "docs/PHASE8_DEPTH_VALIDATION.md"
      - "Circle/Applications/RoPECertifier.lean"
      - "papers/applications/PAPER_AI_04_ROPE_POSITION_CERTIFIER.md"
      - "circle_math/applications/rope_certifier.py"
      - "site/chapters/applications/rope_certifier.qmd"
      - "docs/ROPE_CERTIFIER_QUICKSTART.md"
      - "docs/ROPE_REAL_PHASE_MARGIN_NOTES.md"
    dictionary_dependencies: ["COMMON-0076", "COMMON-0077", "COMMON-0080", "COMMON-0082", "COMMON-0085", "COMMON-0086", "COMMON-0087", "COMMON-0088", "COMMON-0089"]
    next_action: "The unwrapped real phase-gap formula, lower-bound precursor, one-turn endpoint-error bridge, all-nonnegative-full-turn bridge, signed-full-turn bridge, turn-separation predicate, no-near-turn consequence, finite bank-level no-near-turn bridge, turn-ratio scaled Diophantine bridge, and one-channel plus bank-level finite-context margin consequence theorems are now landed through AIRA-T0029 through AIRA-T0033 plus AIRA-T0037 through AIRA-T0043; next prove continued-fraction or Diophantine lower-bound conditions that establish the finite-context margin predicate for concrete turn ratios."
    guardrail: "Do not present numerical margin scans as Lean-proved real RoPE theorems."

  - id: P8-DEPTH-002
    area: "Sparse attention coverage"
    priority: high
    status: active
    target_type: proof_program
    title: "Sparse-attention coverage iff and gap certificates"
    question: "Can local plus stride-family attention contracts characterize exactly which lags are covered, not just exhibit reachable lags?"
    ordinary_baseline: "Sparse-attention design notes that list reachable examples without a proof of coverage gaps."
    acceptance_criteria:
      - "Define a coverage predicate for local-window plus finite stride-family plans over a finite context and candidate budget."
      - "Prove an iff, converse, or no-gap/no-coverage statement that can identify missing lags."
      - "Emit Python certificates that list covered lags, uncovered lags, and candidate counts for fixed plans."
      - "Keep model-quality, long-context, throughput, and memory claims outside the theorem."
    artifact_refs:
      - "docs/PHASE8_DEPTH_VALIDATION.md"
      - "Circle/Applications/CircleTransformer.lean"
      - "papers/applications/PAPER_AI_02_COIL_ATTENTION_AND_MEMORY.md"
      - "sidecars/PAPER_AI_02_COIL_ATTENTION_AND_MEMORY/python/benchmark_stride_family_sparse_attention.py"
      - "site/chapters/applications/ai.qmd"
    dictionary_dependencies: ["COMMON-0075", "COMMON-0079"]
    next_action: "Gap-certificate iff, concrete no-local/no-stride-step gaps, dense-local no-gap, exact local-window threshold, family recursion, budget monotonicity, complete-coverage equivalence, raw budget, context-clipped deduplicated-budget, exact theorem-side lag-candidate membership, query-indexed candidate-list/count, no-collision equality contracts, structural no-collision sufficient conditions, a singleton no-wrap numeric sufficient condition, a compositional finite-family residue no-collision rule, a numeric no-wrap head/tail separation condition, an inductive ordered separated-family sufficient condition, and separated-family local/coil plus full lag-candidate no-collision conditions are now landed through AIT-T0020 through AIT-T0067 and COMMON-0079; next extend these no-collision conditions to query candidates with checkable predecessor-injectivity conditions."
    guardrail: "Do not confuse lag coverage with neural attention quality or runtime."

  - id: P8-DEPTH-003
    area: "Collision counting"
    priority: high
    status: active
    target_type: proof_program
    title: "Finite phase-bank collision counting"
    question: "Can the RoPE certifier count colliding position pairs, not only report the first collision?"
    ordinary_baseline: "Manual or brute-force scan over position pairs without theorem-backed counting."
    acceptance_criteria:
      - "Define colliding unordered or ordered pair counts for a finite context and period bank."
      - "Prove exact formulas for one-period banks and a tractable multi-period case, using gcd/lcm/CRT-style reasoning where appropriate."
      - "Update Python output to include theorem-cited collision counts and representative examples."
      - "Add tests comparing the formula to brute-force enumeration on bounded contexts."
    artifact_refs:
      - "docs/PHASE8_DEPTH_VALIDATION.md"
      - "Circle/Applications/RoPECertifier.lean"
      - "circle_math/applications/rope_certifier.py"
      - "tests/test_rope_certifier.py"
    dictionary_dependencies: ["COMMON-0076", "COMMON-0077", "COMMON-0078"]
    next_action: "The theorem-backed common-gap, common-gap-multiple, exact single-period, and exact integer-bank collision-pair counts are now landed through AIRA-T0027, AIRA-T0028, AIRA-T0034, AIRA-T0035, and AIRA-T0036; next add richer reporting for bounded bank subfamilies and representative discretized failure cases, with brute-force Python parity for small contexts."
    guardrail: "Do not imply the finite integer-period count is a count of real-valued RoPE collisions unless the real model is separately formalized."

  - id: P8-VALID-001
    area: "RoPE results note"
    priority: high
    status: active
    target_type: results_note
    title: "Reproducible RoPE certifier findings on named configurations"
    question: "Can the project say something checkable about real model-like RoPE configurations rather than only shipping tooling?"
    ordinary_baseline: "Configuration prose that states head dimension, base, and context length without a reproducible certificate."
    acceptance_criteria:
      - "Run the certifier on named Llama-style base/context/head-dim configurations plus discretized or quantized variants where exact collisions can occur."
      - "Store JSON outputs or deterministic fixtures under sidecars or generated site data, not as loose reports."
      - "Write a short Living Book results note that distinguishes exact discrete certificates from numerical real-phase margins."
      - "Include commands so a reader can reproduce every table row."
    artifact_refs:
      - "docs/PHASE8_DEPTH_VALIDATION.md"
      - "scripts/rope_certify.py"
      - "sidecars/PAPER_AI_04_ROPE_POSITION_CERTIFIER/python/benchmark_rope_certifier.py"
      - "sidecars/PAPER_AI_04_ROPE_POSITION_CERTIFIER/results/rope_certifier_presets.json"
      - "sidecars/PAPER_AI_04_ROPE_POSITION_CERTIFIER/results/rope_certifier_presets.md"
      - "site/chapters/applications/rope_certifier.qmd"
    dictionary_dependencies: ["COMMON-0077"]
    next_action: "The first preset JSON/Markdown fixtures and Living Book links are in place; next add more named quantized/discretized failure cases where exact collisions genuinely occur and keep model-quality claims out."
    guardrail: "A pass/fail certificate is not evidence of perplexity, long-context ability, runtime, or memory behavior."

  - id: P8-VALID-002
    area: "External checkpoint"
    priority: medium
    status: planned
    target_type: external_review
    title: "One outside review or use checkpoint"
    question: "Can one person outside the repo understand, try, critique, or reuse the certifier?"
    ordinary_baseline: "Private self-review and local tests only."
    acceptance_criteria:
      - "Prepare a concise public review packet: quickstart, theorem ids, limitations, and reproduction commands."
      - "Ask for feedback in an appropriate venue such as Lean Zulip, an ML-verification forum, a GitHub discussion, or a workshop-style note."
      - "Record a durable link or issue and fold actionable feedback into the roadmap without changing proof status by social approval."
    artifact_refs:
      - "docs/PHASE8_DEPTH_VALIDATION.md"
      - "docs/ROPE_CERTIFIER_REVIEW_PACKET.md"
      - "README.md"
      - "papers/applications/PAPER_AI_04_ROPE_POSITION_CERTIFIER.md"
      - "site/chapters/applications/rope_certifier.qmd"
    dictionary_dependencies: ["COMMON-0077"]
    next_action: "The public review packet now exists at docs/ROPE_CERTIFIER_REVIEW_PACKET.md; next ask one focused external venue for critique and record the durable link or issue."
    guardrail: "External interest is validation of usefulness and communication, not a substitute for Lean proofs."

  - id: P8-CONTRACT-001
    area: "Second AI contract"
    priority: high
    status: active
    target_type: proof_contract
    title: "Ring-buffer and KV-cache safety contract"
    question: "Can Circle Calculus prove practical cyclic cache-index safety properties for streaming or long-context inference?"
    ordinary_baseline: "Implementation comments and tests for ring-buffer indexing, overwrite policy, and stale-read avoidance."
    acceptance_criteria:
      - "Define a finite ring-buffer/KV-cache policy with capacity, write step, retained window, and read request."
      - "Prove no-overwrite-before-read or no-stale-read theorems under explicit policy assumptions."
      - "Provide a Python CLI or fixture that emits theorem-cited pass/fail certificates for simple cache policies."
      - "Add a Living Book lesson that treats this as an engineering contract, not a model-quality result."
    artifact_refs:
      - "docs/PHASE8_DEPTH_VALIDATION.md"
      - "papers/applications/PAPER_AI_02_COIL_ATTENTION_AND_MEMORY.md"
      - "Circle/Applications/CircleAI.lean"
      - "sidecars/PAPER_AI_02_COIL_ATTENTION_AND_MEMORY/python/benchmark_kv_cache_ring_buffer.py"
      - "site/chapters/applications/ai.qmd"
    dictionary_dependencies: ["COMMON-0028", "COMMON-0029", "COMMON-0081"]
    next_action: "The KV-cache ring-buffer slot/window certificate is now landed through AIM-T0059 through AIM-T0068 and AIM-B0018, including current-slot distinctness, ordered/unordered retained-token slot distinctness, and duplicate-free retained-batch slot maps; next extend from retained-batch certificates to implementation-level read/write adapters."
    guardrail: "Do not claim the contract proves an implementation language, GPU kernel, or deployed cache unless that implementation is modeled."

