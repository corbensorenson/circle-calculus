      - "sidecars/PAPER_AI_02_COIL_ATTENTION_AND_MEMORY/python/benchmark_kv_cache_ring_buffer.py"
      - "site/chapters/applications/ai.qmd"
    dictionary_dependencies: ["COMMON-0028", "COMMON-0029", "COMMON-0081"]
    next_action: "The KV-cache ring-buffer slot/window certificate is now landed through AIM-T0059 through AIM-T0083 plus AIM-T0086 through AIM-T0089 and AIM-B0018, including current-slot distinctness, ordered/unordered retained-token slot distinctness, duplicate-free retained-batch slot maps, trace-fresh duplicate-free read-batch slot distinctness, the retained-window/next-overwrite-boundary iff, the stale-token next-overwrite-boundary iff, an explicit same-slot overwrite witness for stale non-future tokens, single-token and batch retained iff no-later-same-slot-write trace contracts, a modeled adapter request-trace pass/fail certificate whose pass predicate is equivalent to non-future, duplicate-free, trace-fresh requested tokens under positive cache size, generated live-window membership exactness, duplicate-free generated live-window slots, full live-window finite slot coverage, the live-window slot-count iff, the full-coverage-contract iff, full live-window slot-range coverage iff, generated-live-window request pass and exact-request iff contracts, the retained-token no-later-same-slot-writer read/write guard, an ML-engineer-facing CLI/quickstart, and JSON/Markdown result fixtures with freshness, stale-witness, trace-iff, batch-trace-iff, request-trace pass/fail, exact live-window request, trace-fresh slot-distinctness, and full-window tests; next either model a concrete implementation trace if one exists or move to the sparse-attention coverage iff contract."
