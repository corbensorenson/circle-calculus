  - id: S3Q-T0002
    status: lean_proved
    lean_name: Circle.S3.unitQuaternion_mul_closed
    informal_statement: "Unit quaternions are closed under multiplication."
    formal_statement: "forall p q : Circle.S3.UnitQuaternion, Circle.S3.quaternionNorm (p.val * q.val) = 1"
    dictionary_dependencies: ["S3Q-0001", "S3Q-0002"]
    paper_refs: ["papers/S3/PAPER_S3_02_QUATERNION_COILS.md"]
