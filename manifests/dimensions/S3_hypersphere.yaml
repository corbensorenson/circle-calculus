dimension: S3
status: active
theorems:
  - id: S3C-T0001
    status: lean_proved
    lean_name: Circle.S3.suspensionSurface_counts
    informal_statement: "Suspending a finite surface count model transforms V,E,F into V+2,E+2V,F+2E,2F."
    formal_statement: "forall vertices edges faces : Nat, Circle.S3.suspensionSurfaceCounts vertices edges faces = [vertices+2, edges+2*vertices, faces+2*edges, 2*faces]"
    dictionary_dependencies: ["S3C-0001", "COMMON-0003"]
    paper_refs: ["papers/S3/PAPER_S3_01_FINITE_HYPERSPHERES.md"]
    imports_allowed: ["Common", "S1", "S2"]
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["suspension_counts([v,e,f]) == [v+2,e+2*v,f+2*e,2*f]"]
    blocker: ""
  - id: S3C-T0002
    status: lean_proved
    lean_name: Circle.S3.suspensionSurface_chi_zero
    informal_statement: "If a finite surface model has Euler characteristic 2, its suspension has Euler characteristic 0."
    formal_statement: "forall vertices edges faces : Nat, eulerCharacteristic [vertices,edges,faces] = 2 -> eulerCharacteristic (Circle.S3.suspensionSurfaceCounts vertices edges faces) = 0"
    dictionary_dependencies: ["S3C-0001", "COMMON-0002", "COMMON-0003"]
    paper_refs: ["papers/S3/PAPER_S3_01_FINITE_HYPERSPHERES.md"]
    imports_allowed: ["Common", "S1", "S2"]
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["chi(surface)==2 implies chi(susp(surface))==0"]
    blocker: ""
  - id: S3C-T0003
    status: lean_proved
    lean_name: Circle.S3.suspendedSuspendedCircle_counts
    informal_statement: "Susp(SuspC(n)) has V=n+4, E=5n+4, F=8n, and T=4n."
    formal_statement: "forall n : Nat, Circle.S3.suspendedSuspendedCircleCounts n = [n+4, 5*n+4, 8*n, 4*n]"
    dictionary_dependencies: ["S3C-0001", "S2-0001"]
    paper_refs: ["papers/S3/PAPER_S3_01_FINITE_HYPERSPHERES.md"]
    imports_allowed: ["Common", "S1", "S2"]
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: []
    blocker: ""
  - id: S3C-T0004
    status: lean_proved
    lean_name: Circle.S3.suspendedSuspendedCircle_chi
    informal_statement: "Susp(SuspC(n)) has Euler characteristic 0."
    formal_statement: "forall n : Nat, Circle.Common.eulerCharacteristic (Circle.S3.suspendedSuspendedCircleCounts n) = 0"
    dictionary_dependencies: ["S3C-0001", "S2-0001", "COMMON-0002"]
