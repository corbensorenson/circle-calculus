    lean_name: Circle.S3.quaternion_mul_assoc
    informal_statement: "Quaternion multiplication is associative."
    formal_statement: "forall a b c : Circle.S3.RealQuaternion, (a*b)*c = a*(b*c)"
    dictionary_dependencies: ["S3Q-0001"]
