    informal_statement: "Suspending a finite surface count model transforms V,E,F into V+2,E+2V,F+2E,2F."
    formal_statement: "forall vertices edges faces : Nat, Circle.S3.suspensionSurfaceCounts vertices edges faces = [vertices+2, edges+2*vertices, faces+2*edges, 2*faces]"
    dictionary_dependencies: ["S3C-0001", "COMMON-0003"]
    paper_refs: ["papers/S3/PAPER_S3_01_FINITE_HYPERSPHERES.md"]
    imports_allowed: ["Common", "S1", "S2"]
