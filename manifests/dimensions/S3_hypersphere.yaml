    informal_statement: "Quaternion multiplication is noncommutative by a formal example."
    formal_statement: "Circle.S3.quaternionI * Circle.S3.quaternionJ != Circle.S3.quaternionJ * Circle.S3.quaternionI"
    dictionary_dependencies: ["S3Q-0001", "S3Q-0003"]
