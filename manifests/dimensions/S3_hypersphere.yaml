  - id: S3Q-T0001
    status: lean_proved
    lean_name: Circle.S3.quaternionNorm
    informal_statement: "Define the quaternion norm used for the unit-quaternion S^3 model."
    formal_statement: "def quaternionNorm (q : Circle.S3.RealQuaternion) : Real := Quaternion.normSq q"
    dictionary_dependencies: ["S3Q-0001"]
    paper_refs: ["papers/S3/PAPER_S3_02_QUATERNION_COILS.md"]
