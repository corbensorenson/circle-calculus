    lean_name: Circle.S3.unitQuaternion_inverse
    informal_statement: "The inverse of a unit quaternion is its conjugate."
    formal_statement: "forall q : Circle.S3.UnitQuaternion, q.val * star q.val = 1 and star q.val * q.val = 1"
    dictionary_dependencies: ["S3Q-0001", "S3Q-0002"]
    paper_refs: ["papers/S3/PAPER_S3_02_QUATERNION_COILS.md"]
