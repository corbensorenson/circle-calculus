    informal_statement: "The complex-pair Hopf map sends normalized S^3 points to S^2."
    formal_statement: "Python exploratory model: if |z0|^2 + |z1|^2 = 1, then ||hopf_map(z0,z1)||^2 = 1."
    dictionary_dependencies: ["S3H-0001"]
    paper_refs: ["papers/S3/PAPER_S3_03_HOPF_COILS.md"]
