    status: lean_proved
    lean_name: Circle.S3.quaternionConjugation_neg
    informal_statement: "The quaternion conjugation action is unchanged by replacing q with -q."
    formal_statement: "forall q v : Circle.S3.RealQuaternion, Circle.S3.quaternionConjugationAction (-q) v = Circle.S3.quaternionConjugationAction q v"
    dictionary_dependencies: ["S3S-0001", "S3S-0002", "S3Q-0001"]
