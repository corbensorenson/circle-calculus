dimension: S2
status: active
theorems:
  - id: S2-T0001
    status: lean_proved
    lean_name: Circle.S2.suspendedCircle_counts
    informal_statement: "For n>=3, the suspended finite circle has V=n+2, E=3n, and F=2n."
    formal_statement: "forall n : Nat, Circle.S2.suspendedCircleCounts n = [n+2, 3*n, 2*n]"
    dictionary_dependencies: ["S2-0001", "COMMON-0001"]
    paper_refs: ["papers/S2/PAPER_S2_01_SUSPENDED_CIRCLES.md"]
    imports_allowed: ["Common", "S1"]
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests:
        - sidecars/PAPER_S2_01_SUSPENDED_CIRCLES/python/test_suspended_circle_examples.py
    blocker: ""
  - id: S2-T0002
    status: lean_proved
    lean_name: Circle.S2.suspendedCircle_chi
    informal_statement: "For n>=3, the suspended finite circle has Euler characteristic 2."
    formal_statement: "forall n : Nat, Circle.Common.eulerCharacteristic (Circle.S2.suspendedCircleCounts n) = 2"
    dictionary_dependencies: ["S2-0001", "COMMON-0002"]
    paper_refs: ["papers/S2/PAPER_S2_01_SUSPENDED_CIRCLES.md"]
    imports_allowed: ["Common", "S1"]
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests:
        - sidecars/PAPER_S2_01_SUSPENDED_CIRCLES/python/test_suspended_circle_examples.py
    blocker: ""
  - id: S2-T0003
    status: lean_proved
    lean_name: Circle.S2.sphereGrid_counts
    informal_statement: "For n>=3 and r>=1, SphereGrid(n,r) has V=nr+2, E=n(2r+1), and F=n(r+1)."
    formal_statement: "forall n r : Nat, Circle.S2.sphereGridCounts n r = [n*r+2, n*r+n*(r+1), n*(r+1)]"
    dictionary_dependencies: ["S2-0002", "COMMON-0001"]
    paper_refs: ["papers/S2/PAPER_S2_02_SPHERE_GRIDS_LATITUDE_COILS.md"]
    imports_allowed: ["Common", "S1"]
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests:
        - sidecars/PAPER_S2_02_SPHERE_GRIDS_LATITUDE_COILS/python/test_sphere_grid_examples.py
    blocker: ""
  - id: S2-T0004
    status: lean_proved
    lean_name: Circle.S2.sphereGrid_chi
    informal_statement: "For n>=3 and r>=1, SphereGrid(n,r) has Euler characteristic 2."
    formal_statement: "forall n r : Nat, Circle.Common.eulerCharacteristic (Circle.S2.sphereGridCounts n r) = 2"
    dictionary_dependencies: ["S2-0002", "COMMON-0002"]
    paper_refs: ["papers/S2/PAPER_S2_02_SPHERE_GRIDS_LATITUDE_COILS.md"]
    imports_allowed: ["Common", "S1"]
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests:
        - sidecars/PAPER_S2_02_SPHERE_GRIDS_LATITUDE_COILS/python/test_sphere_grid_examples.py
    blocker: ""
  - id: S2-T0005
    status: lean_proved
    lean_name: Circle.S2.latitudeRing_isCircle
    informal_statement: "Every non-pole latitude ring in a sphere grid is C_n-like."
    formal_statement: "forall (n r : Nat) (latitude : Fin r), Circle.S2.LatitudeRing n r latitude = Circle.C n"
    dictionary_dependencies: ["S2-0002", "S2-0003", "CC-0001"]
    paper_refs: ["papers/S2/PAPER_S2_02_SPHERE_GRIDS_LATITUDE_COILS.md"]
    imports_allowed: ["Common", "S1"]
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests:
        - sidecars/PAPER_S2_02_SPHERE_GRIDS_LATITUDE_COILS/python/test_sphere_grid_examples.py
    blocker: ""
  - id: S2-T0006
    status: lean_proved
    lean_name: Circle.S2.longitudeRotation_fixesPoles
    informal_statement: "A latitude rotation acts on ring nodes and fixes the collapsed poles."
    formal_statement: "forall n r stride : Nat, longitudeRotation n r stride north = north and longitudeRotation n r stride south = south"
    dictionary_dependencies: ["S2-0002", "S2-0004"]
    paper_refs: ["papers/S2/PAPER_S2_02_SPHERE_GRIDS_LATITUDE_COILS.md"]
    imports_allowed: ["Common", "S1"]
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests:
        - sidecars/PAPER_S2_02_SPHERE_GRIDS_LATITUDE_COILS/python/test_sphere_grid_examples.py
    blocker: ""
  - id: S2-T0007
    status: lean_proved
    lean_name: Circle.S2.latitudeCoil_period
    informal_statement: "A fixed latitude ring inherits the S1 coil period n/gcd(n,k)."
    formal_statement: "forall {n k : Nat}, n != 0 -> Circle.period n k = n / Nat.gcd n k"
    dictionary_dependencies: ["S2-0003", "CC-0205"]
    paper_refs: ["papers/S2/PAPER_S2_02_SPHERE_GRIDS_LATITUDE_COILS.md"]
    imports_allowed: ["Common", "S1"]
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests:
        - sidecars/PAPER_S2_02_SPHERE_GRIDS_LATITUDE_COILS/python/test_sphere_grid_examples.py
    blocker: ""
  - id: S2-T0017
    status: lean_proved
    lean_name: Circle.S2.latitudeRingOrbitClassCount_eq_gcd
    informal_statement: "A fixed finite latitude ring inherits the S1 orbit-class count gcd(n,k) for stride k."
    formal_statement: "forall {n k r : Nat}, forall latitude : Fin r, n != 0 -> Circle.S2.latitudeRingOrbitClassCount n k r latitude = Nat.gcd n k"
    dictionary_dependencies: ["S2-0002", "S2-0003", "CC-0208"]
    paper_refs: ["papers/S2/PAPER_S2_02_SPHERE_GRIDS_LATITUDE_COILS.md"]
    imports_allowed: ["Common", "S1"]
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests:
        - sidecars/PAPER_S2_02_SPHERE_GRIDS_LATITUDE_COILS/python/test_sphere_grid_examples.py::test_latitude_orbit_class_count
    blocker: ""
  - id: S2-T0008
    status: lean_proved
    lean_name: Circle.S2.suspendedCircleAntipode_swapsPoles
    informal_statement: "The suspended-circle antipode swaps the north and south poles."
    formal_statement: "forall n : Nat, suspendedCircleAntipode n north = south and suspendedCircleAntipode n south = north"
    dictionary_dependencies: ["S2-0005", "S2-0006"]
    paper_refs: ["papers/S2/PAPER_S2_03_ANTIPODES_AXES_SURFACE_CLOSURE.md"]
    imports_allowed: ["Common", "S1"]
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests:
        - sidecars/PAPER_S2_03_ANTIPODES_AXES_SURFACE_CLOSURE/python/test_s2_antipode_examples.py
    blocker: ""
  - id: S2-T0009
    status: lean_proved
    lean_name: Circle.S2.suspendedCircleAntipode_involutive
    informal_statement: "Applying the suspended-circle antipode twice returns the original point."
    formal_statement: "forall n : Nat, forall point : Circle.S2.SuspendedCirclePoint n, Circle.S2.suspendedCircleAntipode n (Circle.S2.suspendedCircleAntipode n point) = point"
    dictionary_dependencies: ["S2-0005"]
    paper_refs: ["papers/S2/PAPER_S2_03_ANTIPODES_AXES_SURFACE_CLOSURE.md"]
    imports_allowed: ["Common", "S1"]
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests:
        - sidecars/PAPER_S2_03_ANTIPODES_AXES_SURFACE_CLOSURE/python/test_s2_antipode_examples.py
    blocker: ""
  - id: S2-T0010
    status: lean_proved
    lean_name: Circle.S2.suspendedCircleAntipode_preservesPoleSet
    informal_statement: "The suspended-circle antipode preserves the finite pole subset."
    formal_statement: "forall n : Nat, forall point : Circle.S2.SuspendedCirclePoint n, Circle.S2.isSuspendedPole (Circle.S2.suspendedCircleAntipode n point) iff Circle.S2.isSuspendedPole point"
    dictionary_dependencies: ["S2-0005", "S2-0006"]
    paper_refs: ["papers/S2/PAPER_S2_03_ANTIPODES_AXES_SURFACE_CLOSURE.md"]
    imports_allowed: ["Common", "S1"]
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests:
        - sidecars/PAPER_S2_03_ANTIPODES_AXES_SURFACE_CLOSURE/python/test_s2_antipode_examples.py
    blocker: ""
  - id: S2-T0011
    status: lean_proved
    lean_name: Circle.S2.suspendedCircleAntipode_preservesEquatorSet
    informal_statement: "The suspended-circle antipode preserves the finite equator subset."
    formal_statement: "forall n : Nat, forall point : Circle.S2.SuspendedCirclePoint n, Circle.S2.isSuspendedEquator (Circle.S2.suspendedCircleAntipode n point) iff Circle.S2.isSuspendedEquator point"
    dictionary_dependencies: ["S2-0005"]
    paper_refs: ["papers/S2/PAPER_S2_03_ANTIPODES_AXES_SURFACE_CLOSURE.md"]
    imports_allowed: ["Common", "S1"]
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests:
        - sidecars/PAPER_S2_03_ANTIPODES_AXES_SURFACE_CLOSURE/python/test_s2_antipode_examples.py
    blocker: ""
  - id: S2-T0012
    status: lean_proved
    lean_name: Circle.S2.longitudeRotation_preservesLatitudeCoordinate
    informal_statement: "Longitude rotation preserves the finite latitude coordinate of every sphere-grid point."
    formal_statement: "forall n r stride : Nat, forall point : Circle.S2.SphereGridPoint n r, Circle.S2.sphereGridLatitudeCoordinate (Circle.S2.longitudeRotation n r stride point) = Circle.S2.sphereGridLatitudeCoordinate point"
    dictionary_dependencies: ["S2-0003"]
    paper_refs: ["papers/S2/PAPER_S2_03_ANTIPODES_AXES_SURFACE_CLOSURE.md"]
    imports_allowed: ["Common", "S1"]
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests:
        - sidecars/PAPER_S2_03_ANTIPODES_AXES_SURFACE_CLOSURE/python/test_s2_antipode_examples.py
    blocker: ""
  - id: S2-T0013
    status: lean_proved
    lean_name: Circle.S2.longitudeRotation_advancesLongitudeCoordinate
    informal_statement: "Longitude rotation advances the finite longitude coordinate by the corresponding circle rotation while leaving poles without a longitude coordinate."
    formal_statement: "forall n r stride : Nat, forall point : Circle.S2.SphereGridPoint n r, Circle.S2.sphereGridLongitudeCoordinate (Circle.S2.longitudeRotation n r stride point) = Option.map (Circle.rot n stride) (Circle.S2.sphereGridLongitudeCoordinate point)"
    dictionary_dependencies: ["S2-0003", "CC-0101"]
    paper_refs: ["papers/S2/PAPER_S2_03_ANTIPODES_AXES_SURFACE_CLOSURE.md"]
    imports_allowed: ["Common", "S1"]
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests:
        - sidecars/PAPER_S2_03_ANTIPODES_AXES_SURFACE_CLOSURE/python/test_s2_antipode_examples.py
    blocker: ""
  - id: S2-T0014
    status: lean_proved
    lean_name: Circle.S2.suspendedCircleAntipodalPair_self_antipode
    informal_statement: "Every suspended-circle point forms a finite antipodal pair with its antipode."
    formal_statement: "forall n : Nat, forall point : Circle.S2.SuspendedCirclePoint n, Circle.S2.suspendedCircleAntipodalPair n point (Circle.S2.suspendedCircleAntipode n point)"
    dictionary_dependencies: ["S2-0005"]
    paper_refs: ["papers/S2/PAPER_S2_03_ANTIPODES_AXES_SURFACE_CLOSURE.md"]
    imports_allowed: ["Common", "S1"]
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests:
        - sidecars/PAPER_S2_03_ANTIPODES_AXES_SURFACE_CLOSURE/python/test_s2_antipode_examples.py
    blocker: ""
  - id: S2-T0015
    status: lean_proved
    lean_name: Circle.S2.suspendedCircleAntipodalPair_symmetric
    informal_statement: "The finite suspended-circle antipodal-pair relation is symmetric."
    formal_statement: "forall n : Nat, forall p q : Circle.S2.SuspendedCirclePoint n, Circle.S2.suspendedCircleAntipodalPair n p q iff Circle.S2.suspendedCircleAntipodalPair n q p"
    dictionary_dependencies: ["S2-0005"]
    paper_refs: ["papers/S2/PAPER_S2_03_ANTIPODES_AXES_SURFACE_CLOSURE.md"]
    imports_allowed: ["Common", "S1"]
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests:
        - sidecars/PAPER_S2_03_ANTIPODES_AXES_SURFACE_CLOSURE/python/test_s2_antipode_examples.py
    blocker: ""
  - id: S2-T0016
    status: lean_proved
    lean_name: Circle.S2.suspendedCircleAntipode_longitudeRotation_opposite
    informal_statement: "On finite suspended-circle coordinates, antipoding after a signed longitude rotation equals rotating by the opposite signed stride after antipoding."
    formal_statement: "forall n : Nat, forall stride : Int, forall point : Circle.S2.SuspendedCirclePoint n, Circle.S2.suspendedCircleAntipode n (Circle.S2.suspendedCircleLongitudeRotation n stride point) = Circle.S2.suspendedCircleLongitudeRotation n (-stride) (Circle.S2.suspendedCircleAntipode n point)"
    dictionary_dependencies: ["S2-0005", "S2-0006", "CC-0101"]
    paper_refs: ["papers/S2/PAPER_S2_03_ANTIPODES_AXES_SURFACE_CLOSURE.md"]
    imports_allowed: ["Common", "S1"]
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests:
        - sidecars/PAPER_S2_03_ANTIPODES_AXES_SURFACE_CLOSURE/python/test_s2_antipode_examples.py::test_suspended_antipode_longitude_rotation_opposite_stride
    blocker: ""
  - id: S2-T0018
    status: lean_proved
    lean_name: Circle.S2.suspendedCircleAntipode_bijective
    informal_statement: "The finite suspended-circle antipode is a bijection of suspended-circle points."
    formal_statement: "forall n : Nat, Function.Bijective (Circle.S2.suspendedCircleAntipode n)"
    dictionary_dependencies: ["S2-0005", "S2-0006"]
    paper_refs: ["papers/S2/PAPER_S2_03_ANTIPODES_AXES_SURFACE_CLOSURE.md"]
    imports_allowed: ["Common", "S1"]
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests:
        - sidecars/PAPER_S2_03_ANTIPODES_AXES_SURFACE_CLOSURE/python/test_s2_antipode_examples.py::test_suspended_antipode_is_bijective
    blocker: ""
  - id: S2-T0019
    status: lean_proved
    lean_name: Circle.S2.suspendedCircleLongitudeRotation_bijective
    informal_statement: "Every finite suspended-circle signed longitude rotation is a bijection of suspended-circle points."
    formal_statement: "forall n : Nat, forall stride : Int, Function.Bijective (Circle.S2.suspendedCircleLongitudeRotation n stride)"
    dictionary_dependencies: ["S2-0005", "S2-0006", "CC-0101"]
    paper_refs: ["papers/S2/PAPER_S2_03_ANTIPODES_AXES_SURFACE_CLOSURE.md"]
    imports_allowed: ["Common", "S1"]
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests:
        - sidecars/PAPER_S2_03_ANTIPODES_AXES_SURFACE_CLOSURE/python/test_s2_antipode_examples.py::test_suspended_longitude_rotation_is_bijective
    blocker: ""
warnings:
  - id: S2-W0001
    status: active
    dictionary_dependencies: ["S2-W0001"]
    paper_refs: ["papers/S2/PAPER_S2_02_SPHERE_GRIDS_LATITUDE_COILS.md"]
    statement: "C_n x C_m is torus-like, not a sphere."
  - id: S2-W0002
    status: active
    dictionary_dependencies: ["S2-W0002"]
    paper_refs: ["papers/S2/PAPER_S2_02_SPHERE_GRIDS_LATITUDE_COILS.md"]
    statement: "Longitude is not meaningful at collapsed poles."
  - id: S2-W0003
    status: active
    dictionary_dependencies: ["S2-W0003"]
    paper_refs: ["papers/S2/PAPER_S2_02_SPHERE_GRIDS_LATITUDE_COILS.md"]
    statement: "S^2 does not have the natural group structure used for S^1 or S^3."
