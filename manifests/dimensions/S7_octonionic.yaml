    blocker: ""
  - id: S7O-T0005
    status: lean_proved
    lean_name: Circle.S7.octonion_noncommutative_example
    informal_statement: "Octonion multiplication is noncommutative by a formal example."
    formal_statement: "Circle.S7.octonionMulCoord (Circle.S7.octonionBasisCoord ⟨1, by norm_num⟩) (Circle.S7.octonionBasisCoord ⟨2, by norm_num⟩) != Circle.S7.octonionMulCoord (Circle.S7.octonionBasisCoord ⟨2, by norm_num⟩) (Circle.S7.octonionBasisCoord ⟨1, by norm_num⟩)"
