    blocker: ""
  - id: S7QH-T0001
    status: lean_proved
    lean_name: Circle.S7.quaternionicHopf_lands_sphere
    informal_statement: "The quaternionic Hopf coordinate map sends normalized quaternion pairs to the unit S4 equation."
    formal_statement: "forall p : Circle.S7.QuaternionPair, Circle.S7.quaternionPairNormSq p = 1 -> Circle.S7.hopfBase5NormSq (Circle.S7.quaternionicHopfMap p) = 1"
    dictionary_dependencies: ["S7QH-0001", "S3Q-0001", "S4-0001"]
    paper_refs: ["papers/S7/PAPER_S7_02_QUATERNIONIC_HOPF_FIBRATION.md"]
    imports_allowed: ["Common", "S1", "S2", "S3", "S4", "S5", "S6"]
    verification:
