    blocker: ""
  - id: S7O-T0001
    status: lean_proved
    lean_name: Circle.S7.octonionBasis
    informal_statement: "Each coordinate octonion basis element has squared norm one."
    formal_statement: "forall idx : Fin 8, Circle.S7.octonionCoordNormSq (Circle.S7.octonionBasisCoord idx) = 1"
    dictionary_dependencies: ["S7O-0001"]
    paper_refs: ["papers/S7/PAPER_S7_03_OCTONIONIC_UNITS_AND_NONASSOCIATIVE_COILS.md"]
