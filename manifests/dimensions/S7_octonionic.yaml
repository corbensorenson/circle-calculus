    blocker: ""
  - id: S7O-T0003
    status: lean_proved
    lean_name: Circle.S7.octonionNormMul
    informal_statement: "Octonion norm is multiplicative."
    formal_statement: "forall a b : Circle.S7.OctonionCoord, Circle.S7.octonionCoordNormSq (Circle.S7.octonionMulCoord a b) = Circle.S7.octonionCoordNormSq a * Circle.S7.octonionCoordNormSq b"
    dictionary_dependencies: ["S7O-0002"]
    paper_refs: ["papers/S7/PAPER_S7_03_OCTONIONIC_UNITS_AND_NONASSOCIATIVE_COILS.md"]
