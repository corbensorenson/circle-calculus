    blocker: ""
  - id: S7C-T0003
    status: lean_proved
    lean_name: Circle.S7.iteratedSuspensionModel_eq_suspension_s6
    informal_statement: "The finite S7 iterated-suspension model is defined as the suspension of the finite S6 counts."
    formal_statement: "forall n : Nat, Circle.S7.iteratedSuspensionModel n = Circle.Common.suspensionCounts (Circle.S6.counts n)"
    dictionary_dependencies: ["S7C-0001", "S456-0001", "COMMON-0002"]
