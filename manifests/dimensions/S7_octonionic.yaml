    status: lean_proved
    lean_name: Circle.S7.iteratedSuspensionModel
    informal_statement: "S^7 is constructed as a finite iterated-suspension model."
    formal_statement: "def iteratedSuspensionModel (n : Nat) : List Nat := Circle.Common.suspensionCounts (Circle.S6.counts n)"
    dictionary_dependencies: ["S7C-0001", "S456-0001"]
    paper_refs: ["papers/S7/PAPER_S7_01_TOPOLOGICAL_7SPHERE.md"]
    imports_allowed: ["Common", "S1", "S2", "S3", "S4", "S5", "S6"]
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests:
        - sidecars/PAPER_S7_01_TOPOLOGICAL_7SPHERE/python/test_s7_topological_examples.py
    blocker: ""
  - id: S7C-T0002
    status: lean_proved
    lean_name: Circle.S7.eulerCharacteristic
    informal_statement: "The finite iterated-suspension model of S^7 has Euler characteristic 0."
    formal_statement: "forall n : Nat, Circle.Common.eulerCharacteristic (Circle.S7.iteratedSuspensionModel n) = 0"
    dictionary_dependencies: ["S7C-0001", "COMMON-0002"]
    paper_refs: ["papers/S7/PAPER_S7_01_TOPOLOGICAL_7SPHERE.md"]
    imports_allowed: ["Common", "S1", "S2", "S3", "S4", "S5", "S6"]
