    blocker: ""
  - id: S7O-T0006
    status: lean_proved
    lean_name: Circle.S7.octonion_nonassociative_example
    informal_statement: "Octonion multiplication is nonassociative by a formal example."
    formal_statement: "Circle.S7.octonionMulCoord (Circle.S7.octonionMulCoord (Circle.S7.octonionBasisCoord ⟨1, by norm_num⟩) (Circle.S7.octonionBasisCoord ⟨2, by norm_num⟩)) (Circle.S7.octonionBasisCoord ⟨4, by norm_num⟩) != Circle.S7.octonionMulCoord (Circle.S7.octonionBasisCoord ⟨1, by norm_num⟩) (Circle.S7.octonionMulCoord (Circle.S7.octonionBasisCoord ⟨2, by norm_num⟩) (Circle.S7.octonionBasisCoord ⟨4, by norm_num⟩))"
