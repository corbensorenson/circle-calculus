    blocker: ""
  - id: S7O-T0002
    status: lean_proved
    lean_name: Circle.S7.octonionConjugateNorm
    informal_statement: "Define octonion conjugate and norm."
    formal_statement: "forall o : Circle.S7.OctonionCoord, Circle.S7.octonionMulCoord o (Circle.S7.octonionConjCoord o) = Circle.S7.octonionRealCoord (Circle.S7.octonionCoordNormSq o)"
    dictionary_dependencies: ["S7O-0001", "S7O-0002"]
    paper_refs: ["papers/S7/PAPER_S7_03_OCTONIONIC_UNITS_AND_NONASSOCIATIVE_COILS.md"]
