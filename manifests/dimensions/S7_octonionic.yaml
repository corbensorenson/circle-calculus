    blocker: ""
  - id: S7O-T0004
    status: lean_proved
    lean_name: Circle.S7.unitOctonion_mul_closed
    informal_statement: "Unit octonions are closed under multiplication, without forming a group."
    formal_statement: "forall a b : Circle.S7.OctonionCoord, Circle.S7.octonionCoordNormSq a = 1 -> Circle.S7.octonionCoordNormSq b = 1 -> Circle.S7.octonionCoordNormSq (Circle.S7.octonionMulCoord a b) = 1"
    dictionary_dependencies: ["S7O-0002", "S7O-W0001"]
