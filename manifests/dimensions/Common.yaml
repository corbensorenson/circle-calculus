dimension: Common
status: active
theorems:
  - id: COMMON-T0001
    status: lean_proved
    lean_name: Circle.Common.eulerCharacteristic
    informal_statement: "The Euler characteristic of a finite cell-count list is the alternating sum of its cell counts."
    formal_statement: "def eulerCharacteristic : List Nat -> Int, with [] = 0 and count :: rest = count - eulerCharacteristic rest"
    dictionary_dependencies: ["COMMON-0001", "COMMON-0002"]
    paper_refs: ["docs/COMPLETION_ROADMAP.md#common-proof-targets"]
    imports_allowed: ["Common"]
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["euler_characteristic([v,e,f]) == v-e+f"]
    blocker: ""
  - id: COMMON-T0002
    status: lean_proved
    lean_name: Circle.Common.suspensionCounts
    informal_statement: "Suspension transforms finite cell counts by adding two poles and coning adjacent dimensions."
    formal_statement: "def suspensionCounts : List Nat -> List Nat, with [] = [2] and count :: rest = (count + 2) :: suspensionTail count rest"
    dictionary_dependencies: ["COMMON-0001", "COMMON-0003"]
    paper_refs: ["docs/COMPLETION_ROADMAP.md#common-proof-targets"]
    imports_allowed: ["Common"]
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["suspension_counts([v,e,f]) == [v+2,e+2*v,f+2*e,2*f]"]
    blocker: ""
  - id: COMMON-T0003
    status: lean_proved
    lean_name: Circle.Common.suspensionEuler
    informal_statement: "Suspension changes Euler characteristic by chi(Susp K)=2-chi(K)."
    formal_statement: "forall counts : List Nat, eulerCharacteristic (suspensionCounts counts) = 2 - eulerCharacteristic counts"
    dictionary_dependencies: ["COMMON-0002", "COMMON-0003"]
    paper_refs: ["docs/COMPLETION_ROADMAP.md#common-proof-targets"]
    imports_allowed: ["Common"]
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["euler_characteristic(suspension_counts(counts)) == 2-euler_characteristic(counts)"]
    blocker: ""
  - id: P2S-T0001
    status: lean_proved
    lean_name: Circle.Phase2.doubleSuspensionEuler
    informal_statement: "Applying the finite suspension cell-count transform twice preserves Euler characteristic."
    formal_statement: "forall counts : List Nat, eulerCharacteristic (doubleSuspensionCounts counts) = eulerCharacteristic counts"
    dictionary_dependencies: ["COMMON-0002", "COMMON-0003", "COMMON-0004"]
    paper_refs: ["papers/phase2/PAPER_P2_01_STABLE_SPHERE_CALCULUS.md#theorem-spine"]
    imports_allowed: ["Common"]
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["chi(Susp(Susp(counts))) == chi(counts)"]
    blocker: ""
  - id: P2S-T0002
    status: lean_proved
    lean_name: Circle.Phase2.fourSuspensionEuler
    informal_statement: "Four finite suspensions preserve Euler characteristic as two double-suspension steps."
    formal_statement: "forall counts : List Nat, eulerCharacteristic (fourSuspensionCounts counts) = eulerCharacteristic counts"
    dictionary_dependencies: ["COMMON-0002", "COMMON-0003", "COMMON-0004", "COMMON-0005"]
    paper_refs: ["papers/phase2/PAPER_P2_01_STABLE_SPHERE_CALCULUS.md#theorem-spine"]
    imports_allowed: ["Common"]
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["chi(Susp^4(counts)) == chi(counts)"]
    blocker: ""
  - id: P2B-T0001
    status: lean_proved
    lean_name: Circle.Phase2.bottClockIndex_lt_eight
    informal_statement: "The finite period-8 dimension clock always returns an index below 8."
    formal_statement: "forall dimension : Nat, bottClockIndex dimension < 8"
    dictionary_dependencies: ["COMMON-0006"]
    paper_refs: ["papers/phase2/PAPER_P2_02_BOTT_CLIFFORD_PERIODICITY.md#theorem-spine"]
    imports_allowed: ["Common"]
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["0 <= dimension % 8 < 8"]
    blocker: ""
  - id: P2B-T0002
    status: lean_proved
    lean_name: Circle.Phase2.bottClockIndex_add_eight
    informal_statement: "Adding eight dimensions preserves the finite period-8 clock index."
    formal_statement: "forall dimension : Nat, bottClockIndex (dimension + 8) = bottClockIndex dimension"
    dictionary_dependencies: ["COMMON-0006"]
    paper_refs: ["papers/phase2/PAPER_P2_02_BOTT_CLIFFORD_PERIODICITY.md#theorem-spine"]
    imports_allowed: ["Common"]
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["(dimension + 8) % 8 == dimension % 8"]
    blocker: ""
  - id: P2BU-T0001
    status: lean_proved
    lean_name: Circle.Phase2.trivialBundleProjection_point
    informal_statement: "In the trivial product-bundle seed, projecting a built point returns its base coordinate."
    formal_statement: "forall base fiber, trivialBundleProjection (trivialBundlePoint base fiber) = base"
    dictionary_dependencies: ["COMMON-0007", "COMMON-0008"]
    paper_refs: ["papers/phase2/PAPER_P2_03_BUNDLE_CALCULUS.md#theorem-spine"]
    imports_allowed: ["Common"]
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["projection((base,fiber)) == base"]
    blocker: ""
  - id: P2BU-T0002
    status: lean_proved
    lean_name: Circle.Phase2.trivialBundleFiber_point
    informal_statement: "In the trivial product-bundle seed, reading a built point's fiber coordinate returns its fiber value."
    formal_statement: "forall base fiber, trivialBundleFiber (trivialBundlePoint base fiber) = fiber"
    dictionary_dependencies: ["COMMON-0007", "COMMON-0009"]
    paper_refs: ["papers/phase2/PAPER_P2_03_BUNDLE_CALCULUS.md#theorem-spine"]
    imports_allowed: ["Common"]
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["fiber((base,fiber)) == fiber"]
    blocker: ""
  - id: P2BU-T0003
    status: lean_proved
    lean_name: Circle.Phase2.trivialBundleProjection_forgetsFiber
    informal_statement: "In the trivial product-bundle seed, changing only the fiber value does not change the projected base."
    formal_statement: "forall base left right, trivialBundleProjection (trivialBundlePoint base left) = trivialBundleProjection (trivialBundlePoint base right)"
    dictionary_dependencies: ["COMMON-0007", "COMMON-0008", "COMMON-0009"]
    paper_refs: ["papers/phase2/PAPER_P2_03_BUNDLE_CALCULUS.md#theorem-spine"]
    imports_allowed: ["Common"]
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["projection((base,left)) == projection((base,right))"]
    blocker: ""
  - id: P2BC-T0001
    status: lean_proved
    lean_name: Circle.Phase2.boundaryBoundaryInterval_zero
    informal_statement: "In the directed-interval seed, taking point-boundary after interval-boundary gives zero."
    formal_statement: "forall interval : DirectedInterval, pointBoundary (intervalBoundary interval) = 0"
    dictionary_dependencies: ["COMMON-0010", "COMMON-0011"]
    paper_refs: ["papers/phase2/PAPER_P2_04_BOUNDARY_COBORDISM_CALCULUS.md#theorem-spine"]
    imports_allowed: ["Common"]
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["boundary_0(boundary_1(interval)) == 0"]
    blocker: ""
  - id: P2BC-T0002
    status: lean_proved
    lean_name: Circle.Phase2.intervalBoundary_reverse
    informal_statement: "Reversing a directed interval negates its boundary."
    formal_statement: "forall interval : DirectedInterval, intervalBoundary (reverseInterval interval) = -intervalBoundary interval"
    dictionary_dependencies: ["COMMON-0010", "COMMON-0011", "COMMON-0012"]
    paper_refs: ["papers/phase2/PAPER_P2_04_BOUNDARY_COBORDISM_CALCULUS.md#theorem-spine"]
    imports_allowed: ["Common"]
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["boundary(reverse(interval)) == -boundary(interval)"]
    blocker: ""
warnings: []
