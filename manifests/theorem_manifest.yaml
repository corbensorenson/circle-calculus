theorems:
  - id: CC-T0001
    name: Rotation zero
    status: proved
    lean_name: Circle.rot_zero
    informal_statement: "Rotating by zero leaves every node unchanged."
    formal_statement: "forall (n : Nat) (x : Circle.C n), Circle.rot n 0 x = x"
    dictionary_dependencies: ["CC-0001", "CC-0002", "CC-0101"]
    paper_refs: ["PAPER_01_FINITE_CIRCLES.section.rotation"]
    python_tests: ["tests/test_rotation.py::test_rot_zero"]
    proof_notes: "Lean theorem is compiled in Circle/Core/Rotation.lean."
    blocker: ""
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["rot(n,0,i)==i%n"]

  - id: CC-T0002
    name: Rotation composition
    status: proved
    lean_name: Circle.rot_comp
    informal_statement: "Composing rotations adds their strides."
    formal_statement: "forall (n a b : Nat) (x : Circle.C n), Circle.rot n a (Circle.rot n b x) = Circle.rot n (a+b) x"
    dictionary_dependencies: ["CC-0101"]
    paper_refs: ["PAPER_01_FINITE_CIRCLES.section.rotation"]
    python_tests: ["tests/test_rotation.py::test_rot_comp"]
    proof_notes: "Lean theorem is compiled in Circle/Core/Rotation.lean."
    blocker: ""
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["rot(n,a,rot(n,b,i))==rot(n,a+b,i)"]

  - id: CC-T0003
    name: Rotation inverse
    status: proved
    lean_name: Circle.rot_inverse_left
    informal_statement: "A rotation followed by the opposite rotation returns to the starting node."
    formal_statement: "forall (n a : Nat) (x : Circle.C n), x + (a : ZMod n) - (a : ZMod n) = x"
    dictionary_dependencies: ["CC-0101"]
    paper_refs: ["PAPER_01_FINITE_CIRCLES.section.rotation"]
    python_tests: ["tests/test_rotation.py::test_rot_inverse"]
    proof_notes: "Lean theorem is compiled in Circle/Core/Rotation.lean."
    blocker: ""
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["rot(n,-a,rot(n,a,i))==i%n"]

  - id: CC-T0004
    name: Closure condition
    status: proved
    lean_name: Circle.closesAt_iff_stride_multiple_zero
    informal_statement: "A coil closes at step m exactly when m times its stride is zero in C_n."
    formal_statement: "forall (n stride start steps : Nat), Circle.closesAt n stride start steps iff ((steps * stride : Nat) : ZMod n) = 0"
    dictionary_dependencies: ["CC-0201", "CC-0202"]
    paper_refs: ["PAPER_01_FINITE_CIRCLES.section.closure"]
    python_tests: ["tests/test_orbit_period.py::test_period_eq_n_div_gcd"]
    proof_notes: "Lean theorem is compiled in Circle/Core/Coil.lean."
    blocker: ""
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["coil closes at m iff (m*k)%n==0"]

  - id: CC-T0005
    name: Period equals n divided by gcd
    status: proved
    lean_name: Circle.period_eq_n_div_gcd
    informal_statement: "The period of stride k on C_n is n/gcd(n,k)."
    formal_statement: "forall {n k : Nat}, n != 0 -> Circle.period n k = n / Nat.gcd n k"
    dictionary_dependencies: ["CC-0201", "CC-0205"]
    paper_refs: ["PAPER_01_FINITE_CIRCLES.section.period"]
    python_tests: ["tests/test_orbit_period.py::test_period_eq_n_div_gcd"]
    proof_notes: "Lean theorem is compiled in Circle/Core/Period.lean using ZMod.addOrderOf_coe."
    blocker: ""
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["period(n,k)==n//gcd(n,k)"]

  - id: CC-T0006
    name: Orbit decomposition count
    status: proved
    lean_name: Circle.orbit_decomposition_count
    informal_statement: "Stride k partitions C_n into gcd(n,k) disjoint cycles."
    formal_statement: "forall {n k : Nat}, n != 0 -> Circle.orbitClassCount n k = Nat.gcd n k"
    dictionary_dependencies: ["CC-0201", "CC-0205", "CC-0207", "CC-0208"]
    paper_refs: ["PAPER_01_FINITE_CIRCLES.section.orbits"]
    python_tests: ["tests/test_orbit_period.py::test_orbit_decomposition"]
    proof_notes: "Lean theorem is compiled in Circle/Core/Orbit.lean using the quotient by the stride-generated additive subgroup, Lagrange's theorem, Fintype.card_zmultiples, and ZMod.addOrderOf_coe."
    blocker: ""
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["number_of_distinct_orbits(n,k)==gcd(n,k)"]

  - id: CC-T0007
    name: Prime full coil
    status: proved
    lean_name: Circle.prime_full_coil
    informal_statement: "Every nonzero stride smaller than a prime circle size generates a full coil."
    formal_statement: "forall {p k : Nat}, Nat.Prime p -> 0 < k -> k < p -> Circle.period p k = p"
    dictionary_dependencies: ["CC-0201", "CC-0205", "CC-0206"]
    paper_refs: ["PAPER_01_FINITE_CIRCLES.section.prime"]
    python_tests: ["tests/test_prime_coils.py::test_prime_full_coils"]
    proof_notes: "Lean theorem is compiled in Circle/Core/Prime.lean from CC-T0005 and Nat.coprime_of_lt_prime."
    blocker: ""
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["for prime p and 1<=k<p: len(orbit(p,0,k))==p"]

  - id: CC-T0008
    name: Scaling invertible iff coprime
    status: proved
    lean_name: Circle.scale_invertible_iff_coprime
    informal_statement: "Scaling by k is invertible on C_n exactly when gcd(n,k)=1."
    formal_statement: "forall (n k : Nat), Function.Bijective (Circle.scale n k) iff Nat.Coprime n k"
    dictionary_dependencies: ["CC-0001", "CC-0002", "CC-0105"]
    paper_refs: ["papers/S1/PAPER_S1_04_FACTORS_SCALING_PRIME_COILS.md"]
    python_tests: ["tests/test_scaling.py::test_scale_permutation_iff_coprime"]
    proof_notes: "Lean theorem is compiled in Circle/Core/Scaling.lean using ZMod.isUnit_iff_coprime and IsUnit.isUnit_iff_mulLeft_bijective."
    blocker: ""
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["scale is permutation iff gcd(n,k)==1"]

  - id: CC-T0017
    name: Scaling by one identity
    status: proved
    lean_name: Circle.scale_one
    informal_statement: "Scaling by one leaves every node unchanged."
    formal_statement: "forall (n : Nat) (x : Circle.C n), Circle.scale n 1 x = x"
    dictionary_dependencies: ["CC-0001", "CC-0002", "CC-0105"]
    paper_refs: ["papers/S1/PAPER_S1_04_FACTORS_SCALING_PRIME_COILS.md"]
    python_tests: ["tests/test_scaling.py::test_scale_one_identity"]
    proof_notes: "Lean theorem is compiled in Circle/Core/Scaling.lean by reducing scale-by-one to one multiplication in ZMod."
    blocker: ""
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["scale(n,1,i)==i%n"]

  - id: CC-T0018
    name: Scaling composition
    status: proved
    lean_name: Circle.scale_comp
    informal_statement: "Composing scaling maps multiplies their scale factors."
    formal_statement: "forall (n a b : Nat) (x : Circle.C n), Circle.scale n a (Circle.scale n b x) = Circle.scale n (a*b) x"
    dictionary_dependencies: ["CC-0001", "CC-0002", "CC-0105"]
    paper_refs: ["papers/S1/PAPER_S1_04_FACTORS_SCALING_PRIME_COILS.md"]
    python_tests: ["tests/test_scaling.py::test_scale_composition"]
    proof_notes: "Lean theorem is compiled in Circle/Core/Scaling.lean from associativity and natural-number multiplication casting into ZMod."
    blocker: ""
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["scale(n,a,scale(n,b,i))==scale(n,a*b,i)"]

  - id: CC-T0019
    name: Scaling transports rotation stride
    status: proved
    lean_name: Circle.scale_rot
    informal_statement: "Scaling a rotated node equals rotating the scaled node by the scaled stride."
    formal_statement: "forall (n k stride : Nat) (x : Circle.C n), Circle.scale n k (Circle.rot n stride x) = Circle.rot n (k*stride) (Circle.scale n k x)"
    dictionary_dependencies: ["CC-0001", "CC-0002", "CC-0101", "CC-0105", "CC-0201"]
    paper_refs: ["papers/S1/PAPER_S1_04_FACTORS_SCALING_PRIME_COILS.md"]
    python_tests: ["tests/test_scaling.py::test_scale_transports_rotation_stride"]
    proof_notes: "Lean theorem is compiled in Circle/Core/Scaling.lean by distributivity of multiplication over addition in ZMod."
    blocker: ""
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["scale(n,k,rot(n,stride,i))==rot(n,k*stride,scale(n,k,i))"]

  - id: CC-T0020
    name: Scaling transports coil steps
    status: proved
    lean_name: Circle.scale_coilStep
    informal_statement: "Scaling a finite coil step gives the matching coil step with scaled start and scaled stride."
    formal_statement: "forall (n k stride start steps : Nat), Circle.scale n k (Circle.coilStep n stride start steps) = Circle.coilStep n (k*stride) (k*start) steps"
    dictionary_dependencies: ["CC-0001", "CC-0002", "CC-0105", "CC-0201"]
    paper_refs: ["papers/S1/PAPER_S1_04_FACTORS_SCALING_PRIME_COILS.md"]
    python_tests: ["tests/test_scaling.py::test_scale_transports_coil_step"]
    proof_notes: "Lean theorem is compiled in Circle/Core/Scaling.lean from distributivity and natural-number multiplication normalization inside ZMod."
    blocker: ""
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["scale(n,k,coil_step(n,stride,start,steps))==coil_step(n,k*stride,k*start,steps)"]

  - id: CC-T0021
    name: Prime scaling is bijective
    status: proved
    lean_name: Circle.prime_scale_bijective
    informal_statement: "Every nonzero multiplier below a prime circle size gives a reversible scaling map."
    formal_statement: "forall {p k : Nat}, Nat.Prime p -> 0 < k -> k < p -> Function.Bijective (Circle.scale p k)"
    dictionary_dependencies: ["CC-0001", "CC-0002", "CC-0105", "CC-0206"]
    paper_refs: ["papers/S1/PAPER_S1_04_FACTORS_SCALING_PRIME_COILS.md"]
    python_tests: ["tests/test_scaling.py::test_prime_scale_bijective"]
    proof_notes: "Lean theorem is compiled in Circle/Core/Scaling.lean from CC-T0008 and Nat.coprime_of_lt_prime."
    blocker: ""
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["for prime p and 1<=k<p: scale(p,k) is a permutation"]

  - id: CC-T0022
    name: Scaling sends a divisor cofactor to zero
    status: proved
    lean_name: Circle.scale_cofactor_zero
    informal_statement: "If k divides n, then scaling the cofactor address n/k by k lands at zero in C_n."
    formal_statement: "forall {n k : Nat}, k divides n -> Circle.scale n k ((n/k : Nat) : Circle.C n) = 0"
    dictionary_dependencies: ["CC-0001", "CC-0002", "CC-0105", "CC-0205"]
    paper_refs: ["papers/S1/PAPER_S1_04_FACTORS_SCALING_PRIME_COILS.md"]
    python_tests: ["tests/test_scaling.py::test_scale_cofactor_zero_for_divisors"]
    proof_notes: "Lean theorem is compiled in Circle/Core/Scaling.lean using Nat.mul_div_cancel' and the ZMod characteristic cast-to-zero fact."
    blocker: ""
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["if k divides n and n>0, then scale(n,k,n//k)==0"]

  - id: CC-T0023
    name: Scaling sends cofactor multiples to zero
    status: proved
    lean_name: Circle.scale_cofactor_multiple_zero
    informal_statement: "If k divides n, then every multiple of the cofactor n/k lands at zero under scaling by k in C_n."
    formal_statement: "forall {n k m : Nat}, k divides n -> Circle.scale n k ((m*(n/k) : Nat) : Circle.C n) = 0"
    dictionary_dependencies: ["CC-0001", "CC-0002", "CC-0105", "CC-0201", "CC-0205"]
    paper_refs: ["papers/S1/PAPER_S1_04_FACTORS_SCALING_PRIME_COILS.md"]
    python_tests: ["tests/test_scaling.py::test_scale_cofactor_multiples_zero_for_divisors"]
    proof_notes: "Lean theorem is compiled in Circle/Core/Scaling.lean by rewriting k*(m*(n/k)) to m*n and casting the modulus multiple to zero in ZMod."
    blocker: ""
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["if k divides n and n>0, then for m in a bounded range scale(n,k,m*(n//k))==0"]

  - id: CC-T0024
    name: Scaling collapses cofactor-shifted addresses
    status: proved
    lean_name: Circle.scale_add_cofactor_multiple
    informal_statement: "If k divides n, then adding any multiple of n/k to an address does not change its scaled value under k."
    formal_statement: "forall {n k x m : Nat}, k divides n -> Circle.scale n k (((x + m*(n/k)) : Nat) : Circle.C n) = Circle.scale n k ((x : Nat) : Circle.C n)"
    dictionary_dependencies: ["CC-0001", "CC-0002", "CC-0105", "CC-0201", "CC-0207"]
    paper_refs: ["papers/S1/PAPER_S1_04_FACTORS_SCALING_PRIME_COILS.md"]
    python_tests: ["tests/test_scaling.py::test_scale_add_cofactor_multiple_for_divisors"]
    proof_notes: "Lean theorem is compiled in Circle/Core/Scaling.lean from CC-T0023, distributivity of multiplication over addition, and additive zero simplification in ZMod."
    blocker: ""
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["if k divides n and n>0, then scale(n,k,x+m*(n//k))==scale(n,k,x) over bounded examples"]

  - id: CC-T0025
    name: Scaling zero iff modulus divides product
    status: proved
    lean_name: Circle.scale_nat_eq_zero_iff_dvd_mul
    informal_statement: "A natural address x maps to zero under scaling by k exactly when n divides k*x."
    formal_statement: "forall (n k x : Nat), Circle.scale n k ((x : Nat) : Circle.C n) = 0 iff n divides k*x"
    dictionary_dependencies: ["CC-0001", "CC-0002", "CC-0105", "CC-0202"]
    paper_refs: ["papers/S1/PAPER_S1_04_FACTORS_SCALING_PRIME_COILS.md"]
    python_tests: ["tests/test_scaling.py::test_scale_zero_iff_modulus_divides_product"]
    proof_notes: "Lean theorem is compiled in Circle/Core/Scaling.lean by reducing scale to the cast of k*x in ZMod and applying CharP.cast_eq_zero_iff."
    blocker: ""
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["scale(n,k,x)==0 iff (k*x)%n==0 over positive moduli in bounded tests"]

  - id: CC-T0026
    name: Scaling equality iff scaled products are congruent
    status: proved
    lean_name: Circle.scale_nat_eq_iff_mul_modEq
    informal_statement: "Two natural addresses have equal scaled values exactly when their scaled products are congruent modulo n."
    formal_statement: "forall (n k x y : Nat), Circle.scale n k ((x : Nat) : Circle.C n) = Circle.scale n k ((y : Nat) : Circle.C n) iff k*x is congruent to k*y mod n"
    dictionary_dependencies: ["CC-0001", "CC-0002", "CC-0105", "CC-0202", "CC-0207"]
    paper_refs: ["papers/S1/PAPER_S1_04_FACTORS_SCALING_PRIME_COILS.md"]
    python_tests: ["tests/test_scaling.py::test_scale_equality_iff_scaled_products_congruent"]
    proof_notes: "Lean theorem is compiled in Circle/Core/Scaling.lean by rewriting both scaled natural addresses as casts of k*x and k*y, then applying ZMod.natCast_eq_natCast_iff."
    blocker: ""
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["scale(n,k,x)==scale(n,k,y) iff (k*x)%n==(k*y)%n over positive moduli in bounded tests"]

  - id: CC-T0027
    name: Coprime scaling reflects address congruence
    status: proved
    lean_name: Circle.scale_nat_eq_iff_nat_modEq_of_coprime
    informal_statement: "When k is coprime to n, two natural addresses have equal scaled values exactly when the original addresses are congruent modulo n."
    formal_statement: "forall {n k x y : Nat}, Nat.Coprime n k -> Circle.scale n k ((x : Nat) : Circle.C n) = Circle.scale n k ((y : Nat) : Circle.C n) iff x is congruent to y mod n"
    dictionary_dependencies: ["CC-0001", "CC-0002", "CC-0105", "CC-0202", "CC-0207"]
    paper_refs: ["papers/S1/PAPER_S1_04_FACTORS_SCALING_PRIME_COILS.md"]
    python_tests: ["tests/test_scaling.py::test_coprime_scale_equality_iff_addresses_congruent"]
    proof_notes: "Lean theorem is compiled in Circle/Core/Scaling.lean from CC-T0008, injectivity of the bijective scaling map, and ZMod.natCast_eq_natCast_iff."
    blocker: ""
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["if gcd(n,k)==1, then scale(n,k,x)==scale(n,k,y) iff x%n==y%n over bounded tests"]

  - id: CC-T0028
    name: Scaling by zero collapses to zero
    status: proved
    lean_name: Circle.scale_zero_factor
    informal_statement: "Scaling by zero sends every finite-circle address to zero."
    formal_statement: "forall (n : Nat) (x : Circle.C n), Circle.scale n 0 x = 0"
    dictionary_dependencies: ["CC-0001", "CC-0002", "CC-0105"]
    paper_refs: ["papers/S1/PAPER_S1_04_FACTORS_SCALING_PRIME_COILS.md"]
    python_tests: ["tests/test_scaling.py::test_scale_zero_factor"]
    proof_notes: "Lean theorem is compiled in Circle/Core/Scaling.lean by reducing scale-by-zero to zero multiplication in ZMod."
    blocker: ""
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["scale(n,0,x)==0 over positive moduli in bounded tests"]

  - id: CC-T0029
    name: Congruent scale factors act identically
    status: proved
    lean_name: Circle.scale_factor_modEq
    informal_statement: "Scale factors that are congruent modulo n define the same scaling map on C_n."
    formal_statement: "forall {n k l : Nat}, k congruent to l mod n -> forall x : Circle.C n, Circle.scale n k x = Circle.scale n l x"
    dictionary_dependencies: ["CC-0001", "CC-0002", "CC-0105", "CC-0202"]
    paper_refs: ["papers/S1/PAPER_S1_04_FACTORS_SCALING_PRIME_COILS.md"]
    python_tests: ["tests/test_scaling.py::test_scale_factor_mod_equivalent"]
    proof_notes: "Lean theorem is compiled in Circle/Core/Scaling.lean by casting scale factors into ZMod and applying ZMod.natCast_eq_natCast_iff."
    blocker: ""
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["scale(n,k,x)==scale(n,k+m*n,x) over positive moduli in bounded tests"]

  - id: CC-T0030
    name: Scaling kernel is period divisibility
    status: proved
    lean_name: Circle.scale_nat_eq_zero_iff_period_dvd
    informal_statement: "For a nonzero circle size, a natural address scales to zero exactly when the stride period divides that address."
    formal_statement: "forall {n k x : Nat}, n != 0 -> Circle.scale n k ((x : Nat) : Circle.C n) = 0 iff Circle.period n k divides x"
    dictionary_dependencies: ["CC-0001", "CC-0002", "CC-0105", "CC-0205"]
    paper_refs: ["papers/S1/PAPER_S1_04_FACTORS_SCALING_PRIME_COILS.md"]
    python_tests: ["tests/test_scaling.py::test_scale_zero_iff_period_divides_address"]
    proof_notes: "Lean theorem is compiled in Circle/Core/Scaling.lean from CC-T0025, CC-T0005, gcd reduction, and coprime divisibility cancellation."
    blocker: ""
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["scale(n,k,x)==0 iff x%period(n,k)==0 over positive moduli in bounded tests"]

  - id: CC-T0031
    name: Scaling a step index gives the matching coil step
    status: proved
    lean_name: Circle.scale_nat_to_coilStep
    informal_statement: "Scaling a natural step index by stride k gives the same address as walking k for that many coil steps from zero."
    formal_statement: "forall (n k steps : Nat), Circle.scale n k ((steps : Nat) : Circle.C n) = Circle.coilStep n k 0 steps"
    dictionary_dependencies: ["CC-0001", "CC-0002", "CC-0105", "CC-0201"]
    paper_refs: ["papers/S1/PAPER_S1_04_FACTORS_SCALING_PRIME_COILS.md"]
    python_tests: ["tests/test_scaling.py::test_scale_natural_step_to_coil_step"]
    proof_notes: "Lean theorem is compiled in Circle/Core/Scaling.lean by unfolding scale and coilStep and normalizing natural multiplication in ZMod."
    blocker: ""
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["scale(n,k,steps)==coil_step(n,k,0,steps) over positive moduli in bounded tests"]

  - id: CC-T0032
    name: Scaling period multiples gives zero
    status: proved
    lean_name: Circle.scale_period_multiple_zero
    informal_statement: "For a nonzero circle size, every natural multiple of the stride period maps to zero under scaling by that stride."
    formal_statement: "forall {n k m : Nat}, n != 0 -> Circle.scale n k ((m * Circle.period n k : Nat) : Circle.C n) = 0"
    dictionary_dependencies: ["CC-0001", "CC-0002", "CC-0105", "CC-0205"]
    paper_refs: ["papers/S1/PAPER_S1_04_FACTORS_SCALING_PRIME_COILS.md"]
    python_tests: ["tests/test_scaling.py::test_scale_period_multiples_zero"]
    proof_notes: "Lean theorem is compiled in Circle/Core/Scaling.lean from CC-T0030 and divisibility of a multiple by its factor."
    blocker: ""
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["scale(n,k,m*period(n,k))==0 over positive moduli in bounded tests"]

  - id: CC-T0033
    name: Scaling collapses period-shifted addresses
    status: proved
    lean_name: Circle.scale_add_period_multiple
    informal_statement: "For a nonzero circle size, adding any natural multiple of the stride period to an address does not change its scaled value."
    formal_statement: "forall {n k x m : Nat}, n != 0 -> Circle.scale n k (((x + m * Circle.period n k) : Nat) : Circle.C n) = Circle.scale n k ((x : Nat) : Circle.C n)"
    dictionary_dependencies: ["CC-0001", "CC-0002", "CC-0105", "CC-0205"]
    paper_refs: ["papers/S1/PAPER_S1_04_FACTORS_SCALING_PRIME_COILS.md"]
    python_tests: ["tests/test_scaling.py::test_scale_add_period_multiple"]
    proof_notes: "Lean theorem is compiled in Circle/Core/Scaling.lean from CC-T0032, CC-T0025, and modular addition congruence."
    blocker: ""
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["scale(n,k,x+m*period(n,k))==scale(n,k,x) over positive moduli in bounded tests"]

  - id: CC-T0034
    name: Scaling has period normal form
    status: proved
    lean_name: Circle.scale_nat_period_normalForm
    informal_statement: "For a nonzero circle size, scaling a natural address has the same value as scaling its residue modulo the stride period."
    formal_statement: "forall {n k x : Nat}, n != 0 -> Circle.scale n k ((x : Nat) : Circle.C n) = Circle.scale n k (((x % Circle.period n k) : Nat) : Circle.C n)"
    dictionary_dependencies: ["CC-0001", "CC-0002", "CC-0105", "CC-0205"]
