theorems:
  - id: CC-T0001
    name: Rotation zero
    status: proved
    lean_name: Circle.rot_zero
    informal_statement: "Rotating by zero leaves every node unchanged."
    formal_statement: "forall (n : Nat) (x : Circle.C n), Circle.rot n 0 x = x"
    dictionary_dependencies: ["CC-0001", "CC-0002", "CC-0101"]
    paper_refs: ["PAPER_01_FINITE_CIRCLES.section.rotation"]
    python_tests: ["tests/test_rotation.py::test_rot_zero"]
    proof_notes: "Lean theorem is compiled in Circle/Core/Rotation.lean."
    blocker: ""
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["rot(n,0,i)==i%n"]

  - id: CC-T0002
    name: Rotation composition
    status: proved
    lean_name: Circle.rot_comp
    informal_statement: "Composing rotations adds their strides."
    formal_statement: "forall (n a b : Nat) (x : Circle.C n), Circle.rot n a (Circle.rot n b x) = Circle.rot n (a+b) x"
    dictionary_dependencies: ["CC-0101"]
    paper_refs: ["PAPER_01_FINITE_CIRCLES.section.rotation"]
    python_tests: ["tests/test_rotation.py::test_rot_comp"]
    proof_notes: "Lean theorem is compiled in Circle/Core/Rotation.lean."
    blocker: ""
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["rot(n,a,rot(n,b,i))==rot(n,a+b,i)"]

  - id: CC-T0003
    name: Rotation inverse
    status: proved
    lean_name: Circle.rot_inverse_left
    informal_statement: "A rotation followed by the opposite rotation returns to the starting node."
    formal_statement: "forall (n a : Nat) (x : Circle.C n), x + (a : ZMod n) - (a : ZMod n) = x"
    dictionary_dependencies: ["CC-0101"]
    paper_refs: ["PAPER_01_FINITE_CIRCLES.section.rotation"]
    python_tests: ["tests/test_rotation.py::test_rot_inverse"]
    proof_notes: "Lean theorem is compiled in Circle/Core/Rotation.lean."
    blocker: ""
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["rot(n,-a,rot(n,a,i))==i%n"]

  - id: CC-T0004
    name: Closure condition
    status: proved
    lean_name: Circle.closesAt_iff_stride_multiple_zero
    informal_statement: "A coil closes at step m exactly when m times its stride is zero in C_n."
    formal_statement: "forall (n stride start steps : Nat), Circle.closesAt n stride start steps iff ((steps * stride : Nat) : ZMod n) = 0"
    dictionary_dependencies: ["CC-0201", "CC-0202"]
    paper_refs: ["PAPER_01_FINITE_CIRCLES.section.closure"]
    python_tests: ["tests/test_orbit_period.py::test_period_eq_n_div_gcd"]
    proof_notes: "Lean theorem is compiled in Circle/Core/Coil.lean."
    blocker: ""
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["coil closes at m iff (m*k)%n==0"]

  - id: CC-T0005
    name: Period equals n divided by gcd
    status: proved
    lean_name: Circle.period_eq_n_div_gcd
    informal_statement: "The period of stride k on C_n is n/gcd(n,k)."
    formal_statement: "forall {n k : Nat}, n != 0 -> Circle.period n k = n / Nat.gcd n k"
    dictionary_dependencies: ["CC-0201", "CC-0205"]
    paper_refs: ["PAPER_01_FINITE_CIRCLES.section.period"]
    python_tests: ["tests/test_orbit_period.py::test_period_eq_n_div_gcd"]
    proof_notes: "Lean theorem is compiled in Circle/Core/Period.lean using ZMod.addOrderOf_coe."
    blocker: ""
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["period(n,k)==n//gcd(n,k)"]

  - id: CC-T0006
    name: Orbit decomposition count
    status: proved
    lean_name: Circle.orbit_decomposition_count
    informal_statement: "Stride k partitions C_n into gcd(n,k) disjoint cycles."
    formal_statement: "forall {n k : Nat}, n != 0 -> Circle.orbitClassCount n k = Nat.gcd n k"
    dictionary_dependencies: ["CC-0201", "CC-0205", "CC-0207", "CC-0208"]
    paper_refs: ["PAPER_01_FINITE_CIRCLES.section.orbits"]
    python_tests: ["tests/test_orbit_period.py::test_orbit_decomposition"]
    proof_notes: "Lean theorem is compiled in Circle/Core/Orbit.lean using the quotient by the stride-generated additive subgroup, Lagrange's theorem, Fintype.card_zmultiples, and ZMod.addOrderOf_coe."
    blocker: ""
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["number_of_distinct_orbits(n,k)==gcd(n,k)"]

  - id: CC-T0007
    name: Prime full coil
    status: proved
    lean_name: Circle.prime_full_coil
    informal_statement: "Every nonzero stride smaller than a prime circle size generates a full coil."
    formal_statement: "forall {p k : Nat}, Nat.Prime p -> 0 < k -> k < p -> Circle.period p k = p"
    dictionary_dependencies: ["CC-0201", "CC-0205", "CC-0206"]
    paper_refs: ["PAPER_01_FINITE_CIRCLES.section.prime"]
    python_tests: ["tests/test_prime_coils.py::test_prime_full_coils"]
    proof_notes: "Lean theorem is compiled in Circle/Core/Prime.lean from CC-T0005 and Nat.coprime_of_lt_prime."
    blocker: ""
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["for prime p and 1<=k<p: len(orbit(p,0,k))==p"]

  - id: CC-T0073
    name: Primitive horizon containment iff divisibility
    status: proved
    lean_name: Circle.primitiveHorizonContained_iff_dvd
    informal_statement: "The primitive d-horizon is contained in the n-horizon exactly when d divides n."
    formal_statement: "forall (n d : Nat), Circle.primitiveHorizonContained n d iff d divides n"
    dictionary_dependencies: ["CC-0201", "CC-0205"]
    paper_refs: ["docs/PRIME_ENGINE.md"]
    python_tests: ["cargo test -p circle-prime controls/coil containment tests"]
    proof_notes: "Lean theorem is compiled in Circle/Core/Horizon.lean by unfolding primitive horizon containment to divisibility."
    blocker: ""
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["contains_horizon(n,d)==(n%d==0)"]

  - id: CC-T0074
    name: Prime horizon iff no smaller contained horizon
    status: proved
    lean_name: Circle.primeHorizon_iff_no_smaller_contained
    informal_statement: "An n-horizon is prime exactly when n is at least two and it contains no nontrivial smaller primitive horizon."
    formal_statement: "forall {n : Nat}, Circle.primeHorizon n iff 2 <= n and forall d, 2 <= d -> d < n -> not (Circle.primitiveHorizonContained n d)"
    dictionary_dependencies: ["CC-0201", "CC-0206"]
    paper_refs: ["docs/PRIME_ENGINE.md"]
    python_tests: ["tests/test_prime_coils.py::test_prime_full_coils", "cargo test -p circle-prime"]
    proof_notes: "Lean theorem is compiled in Circle/Core/Horizon.lean from Nat.prime_def_lt'."
    blocker: ""
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["prime(n) iff no d with 2<=d<n divides n"]

  - id: CC-T0075
    name: Prime horizon iff no square-root contained horizon
    status: proved
    lean_name: Circle.primeHorizon_iff_no_sqrt_contained
    informal_statement: "An n-horizon is prime exactly when n is at least two and no primitive horizon d up to sqrt(n) is contained in it."
    formal_statement: "forall {n : Nat}, Circle.primeHorizon n iff 2 <= n and forall d, 2 <= d -> d <= Nat.sqrt n -> not (Circle.primitiveHorizonContained n d)"
    dictionary_dependencies: ["CC-0201", "CC-0206"]
    paper_refs: ["docs/PRIME_ENGINE.md"]
    python_tests: ["tests/test_rust_prime_cli.py::test_rust_prime_cli_classifies_known_values", "cargo test -p circle-prime"]
    proof_notes: "Lean theorem is compiled in Circle/Core/Horizon.lean from Nat.prime_def_le_sqrt. This is the proof-backed square-root cutoff used by the Rust range and scalar paths."
    blocker: ""
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["prime(n) iff no d with 2<=d<=isqrt(n) divides n"]

  - id: CC-T0076
    name: Prime horizon from no square-root contained horizon
    status: proved
    lean_name: Circle.primeHorizon_of_no_sqrt_contained
    informal_statement: "If n is at least two and no primitive horizon d up to sqrt(n) is contained in it, then the n-horizon is prime."
    formal_statement: "forall {n : Nat}, 2 <= n -> (forall d, 2 <= d -> d <= Nat.sqrt n -> not (Circle.primitiveHorizonContained n d)) -> Circle.primeHorizon n"
    dictionary_dependencies: ["CC-0201", "CC-0206"]
    paper_refs: ["docs/PRIME_ENGINE.md"]
    python_tests: ["tests/test_rust_prime_cli.py::test_rust_prime_cli_classifies_known_values", "cargo test -p circle-prime"]
    proof_notes: "Lean theorem is compiled in Circle/Core/Horizon.lean as the forward operational direction of CC-T0075. This is the theorem-shaped contract for Rust's sqrt-bounded divisor search accepting a candidate."
    blocker: ""
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["if no d with 2<=d<=isqrt(n) divides n, prime(n)"]

  - id: CC-T0077
    name: Non-prime horizon has square-root contained horizon
    status: proved
    lean_name: Circle.not_primeHorizon_has_sqrt_contained
    informal_statement: "If n is at least two and its horizon is not prime, then some primitive horizon d up to sqrt(n) is contained in it."
    formal_statement: "forall {n : Nat}, 2 <= n -> not (Circle.primeHorizon n) -> exists d, 2 <= d and d <= Nat.sqrt n and Circle.primitiveHorizonContained n d"
    dictionary_dependencies: ["CC-0201", "CC-0206"]
    paper_refs: ["docs/PRIME_ENGINE.md"]
    python_tests: ["tests/test_rust_prime_cli.py::test_rust_prime_cli_classifies_known_values", "cargo test -p circle-prime"]
    proof_notes: "Lean theorem is compiled in Circle/Core/Horizon.lean as the contrapositive operational direction of CC-T0075. This is the theorem-shaped contract for Rust's sqrt-bounded divisor search finding a witness for every composite candidate."
    blocker: ""
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["if n is composite, some d with 2<=d<=isqrt(n) divides n"]

  - id: CC-T0078
    name: Prime horizons in range membership
    status: proved
    lean_name: Circle.mem_primeHorizonsInRange_iff
    informal_statement: "A horizon belongs to the finite prime-horizon interval exactly when it lies in the half-open range and is a prime horizon."
    formal_statement: "forall {low high n : Nat}, n in Circle.primeHorizonsInRange low high iff low <= n and n < high and Circle.primeHorizon n"
    dictionary_dependencies: ["CC-0201", "CC-0206"]
    paper_refs: ["docs/PRIME_ENGINE.md"]
    python_tests: ["tests/test_rust_prime_cli.py::test_rust_prime_cli_counts_reference_range", "cargo test -p circle-prime"]
    proof_notes: "Lean theorem is compiled in Circle/Core/Horizon.lean by unfolding the half-open Finset interval filter used as the Rust range-count specification."
    blocker: ""
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["n is counted for [low, high) iff low <= n < high and n is prime"]

  - id: CC-T0079
    name: Prime horizon range count is filter cardinality
    status: proved
    lean_name: Circle.primeHorizonRangeCount_eq_filter_card
    informal_statement: "The prime-horizon range count is the cardinality of the finite half-open interval filtered by prime horizons."
    formal_statement: "forall (low high : Nat), Circle.primeHorizonRangeCount low high = card ((Finset.Ico low high).filter Circle.primeHorizon)"
    dictionary_dependencies: ["CC-0201", "CC-0206"]
    paper_refs: ["docs/PRIME_ENGINE.md"]
    python_tests: ["tests/test_rust_prime_cli.py::test_rust_prime_cli_counts_reference_range", "cargo test -p circle-prime"]
    proof_notes: "Lean theorem is compiled in Circle/Core/Horizon.lean as the finite-cardinality specification that every Rust count mode must implement."
    blocker: ""
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["range count equals number of primes in the half-open interval"]

  - id: CC-T0080
    name: Next prime horizon result for found candidate
    status: proved
    lean_name: Circle.nextPrimeHorizonResultUpTo_some_iff
    informal_statement: "A found next-prime result is exactly a prime horizon at or above the start, within the finite domain ceiling, with no earlier prime horizon in between."
    formal_statement: "forall {start high p : Nat}, Circle.nextPrimeHorizonResultUpTo start high (some p) iff p <= high and start <= p and Circle.primeHorizon p and forall n, start <= n -> n < p -> not (Circle.primeHorizon n)"
    dictionary_dependencies: ["CC-0201", "CC-0206"]
    paper_refs: ["docs/PRIME_ENGINE.md"]
    python_tests: ["tests/test_rust_prime_cli.py::test_rust_prime_cli_finds_next_prime", "tests/test_prime_external_correctness.py::test_run_next_checks_compares_against_primesieve_and_primecount"]
    proof_notes: "Lean theorem is compiled in Circle/Core/Horizon.lean as the finite-domain next-prime result spec for a found candidate. Rust supplies the exact u64 search and external controls check representative starts."
    blocker: ""
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["next(start)=p implies p is prime, start<=p<=u64::MAX, and no prime lies in [start,p)"]

  - id: CC-T0081
    name: Next prime horizon result for no candidate
    status: proved
    lean_name: Circle.nextPrimeHorizonResultUpTo_none_iff
    informal_statement: "A not-found next-prime result is exactly the absence of any prime horizon from the start through the finite domain ceiling."
    formal_statement: "forall {start high : Nat}, Circle.nextPrimeHorizonResultUpTo start high none iff forall n, start <= n -> n <= high -> not (Circle.primeHorizon n)"
    dictionary_dependencies: ["CC-0201", "CC-0206"]
    paper_refs: ["docs/PRIME_ENGINE.md"]
    python_tests: ["tests/test_rust_prime_cli.py::test_rust_prime_cli_reports_no_next_prime_in_u64_domain", "tests/test_prime_external_correctness.py::test_run_next_checks_skips_primecount_above_cap"]
    proof_notes: "Lean theorem is compiled in Circle/Core/Horizon.lean as the finite-domain next-prime not-found spec. Rust's u64 boundary behavior is checked against external controls at the top of the domain."
    blocker: ""
    verification:
      lean_build_required: true
      no_sorry_required: true
      python_property_tests: ["next(start)=none implies no prime exists in [start,u64::MAX]"]

