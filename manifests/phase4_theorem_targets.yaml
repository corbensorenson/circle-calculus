targets:
  - id: P4-S0-001
    layer: S0
    priority: high
    status: promoted
    promoted_theorem_id: S0-T0003
    claim_type: theorem
    title: "S0 antipode has no fixed point"
    target_statement: "For every S0 point x, antipode x is distinct from x."
    candidate_formalization: "forall x : Circle.S0.Sign, Circle.S0.antipode x != x"
    paper_refs: ["papers/S0/PAPER_S0_01_TWO_POINT_OPPOSITION.md"]
    dictionary_dependencies: ["S0-0001", "S0-0002"]
    next_action: "Promoted to S0-T0003 and Lean-proved as Circle.S0.antipode_ne."
    guardrail: "Do not identify S0 with C_1."

  - id: P4-S0-002
    layer: S0
    priority: medium
    status: promoted
    promoted_theorem_id: S0-T0004
    claim_type: theorem
    title: "S0 antipode swaps the two named signs"
    target_statement: "The S0 antipode sends each named sign to the other sign."
    candidate_formalization: "Circle.S0.antipode Circle.S0.Sign.neg = Circle.S0.Sign.pos and Circle.S0.antipode Circle.S0.Sign.pos = Circle.S0.Sign.neg"
    paper_refs: ["papers/S0/PAPER_S0_01_TWO_POINT_OPPOSITION.md"]
    dictionary_dependencies: ["S0-0001", "S0-0002"]
    next_action: "Promoted to S0-T0004 and Lean-proved as Circle.S0.antipode_swaps."
    guardrail: "Keep this as finite opposition, not a cyclic rotation claim."

  - id: P4-S1-001
    layer: S1
    priority: high
    status: promoted
    promoted_theorem_id: CC-T0054
    claim_type: theorem
    title: "Full coil iff coprime"
    target_statement: "On a positive finite circle, stride k is a full coil exactly when gcd(n,k)=1."
    candidate_formalization: "n != 0 -> (Circle.period n k = n iff Nat.gcd n k = 1)"
    paper_refs: ["papers/S1/PAPER_S1_04_FACTORS_SCALING_PRIME_COILS.md"]
    dictionary_dependencies: ["CC-0205", "CC-0206"]
    next_action: "Promoted to CC-T0054 and Lean-proved as Circle.fullCoil_iff_coprime."
    guardrail: "Do not restrict the result to prime n; prime full-coil is only the common corollary."

  - id: P4-S1-002
    layer: S1
    priority: high
    status: promoted
    promoted_theorem_id: CC-T0061
    supporting_theorem_ids: ["CC-T0055", "CC-T0059", "CC-T0060"]
    claim_type: theorem
    title: "Orbit membership by gcd congruence"
    target_statement: "Two nodes lie in the same stride-k orbit exactly when their representatives differ by a multiple of gcd(n,k)."
    candidate_formalization: "n != 0 -> sameOrbit n k x y iff Nat.gcd n k divides representative_difference x y"
    paper_refs: ["papers/PAPER_01_FINITE_CIRCLES.md", "papers/S1/PAPER_S1_01_FINITE_CIRCLES.md"]
    dictionary_dependencies: ["CC-0201", "CC-0207", "CC-0208"]
    next_action: "Promoted to CC-T0061, with CC-T0055, CC-T0059, and CC-T0060 as the quotient, forward, and reverse support theorems."
    guardrail: "Avoid ad hoc integer representatives that are not tied to ZMod equality."

  - id: P4-S1-003
    layer: S1
    priority: medium
    status: promoted
    promoted_theorem_id: CC-T0058
    supporting_theorem_ids: ["CC-T0056", "CC-T0057"]
    claim_type: theorem
    title: "Affine circle automorphism normal form"
    target_statement: "Every map built as a rotation after coprime scaling is a finite-circle bijection, and composition follows affine modular arithmetic."
    candidate_formalization: "Nat.Coprime n a -> Function.Bijective (fun x => Circle.rot n b (Circle.scale n a x)) plus a composition normal form"
    paper_refs: ["papers/S1/PAPER_S1_04_FACTORS_SCALING_PRIME_COILS.md"]
    dictionary_dependencies: ["CC-0101", "CC-0105"]
    next_action: "Promoted to CC-T0058 with supporting Lean theorems CC-T0056 and CC-T0057; leave full affine classification for a later target."
    guardrail: "Do not claim all endomorphisms are affine unless the classification is separately proved."

  - id: P4-S2-001
    layer: S2
    priority: high
    status: planned
    claim_type: theorem
    title: "Longitude rotation commutes with suspended-circle antipode"
    target_statement: "On equator coordinates, rotating longitude and then taking the antipode agrees with taking the antipode and rotating by the opposite stride."
    candidate_formalization: "suspendedCircleAntipode n (longitudeRotation n stride p) = longitudeRotation n (-stride) (suspendedCircleAntipode n p)"
    paper_refs: ["papers/S2/PAPER_S2_03_ANTIPODES_AXES_SURFACE_CLOSURE.md"]
    dictionary_dependencies: ["S2-0005", "S2-0006", "CC-0101"]
    next_action: "Confirm signed or modular stride API for S2 longitude rotation."
    guardrail: "Do not assign independent longitude coordinates to poles."

