    title: "Latitude-ring orbit decomposition inherits S1 orbit count"
    target_statement: "Each non-pole latitude ring decomposes under a stride into gcd(n,k) finite cycles."
    candidate_formalization: "For each latitude ring, orbitClassCount n k = Nat.gcd n k"
