  - id: P4-S1-001
    layer: S1
    priority: high
    status: promoted
    promoted_theorem_id: CC-T0054
    claim_type: theorem
    title: "Full coil iff coprime"
    target_statement: "On a positive finite circle, stride k is a full coil exactly when gcd(n,k)=1."
    candidate_formalization: "n != 0 -> (Circle.period n k = n iff Nat.gcd n k = 1)"
    paper_refs: ["papers/S1/PAPER_S1_04_FACTORS_SCALING_PRIME_COILS.md"]
    dictionary_dependencies: ["CC-0205", "CC-0206"]
    next_action: "Promoted to CC-T0054 and Lean-proved as Circle.fullCoil_iff_coprime."
    guardrail: "Do not restrict the result to prime n; prime full-coil is only the common corollary."

  - id: P4-S1-002
    layer: S1
    priority: high
    status: promoted
    promoted_theorem_id: CC-T0061
    supporting_theorem_ids: ["CC-T0055", "CC-T0059", "CC-T0060"]
    claim_type: theorem
    title: "Orbit membership by gcd congruence"
    target_statement: "Two nodes lie in the same stride-k orbit exactly when their representatives differ by a multiple of gcd(n,k)."
    candidate_formalization: "n != 0 -> sameOrbit n k x y iff Nat.gcd n k divides representative_difference x y"
    paper_refs: ["papers/PAPER_01_FINITE_CIRCLES.md", "papers/S1/PAPER_S1_01_FINITE_CIRCLES.md"]
    dictionary_dependencies: ["CC-0201", "CC-0207", "CC-0208"]
    next_action: "Promoted to CC-T0061, with CC-T0055, CC-T0059, and CC-T0060 as the quotient, forward, and reverse support theorems."
    guardrail: "Avoid ad hoc integer representatives that are not tied to ZMod equality."

  - id: P4-S1-003
