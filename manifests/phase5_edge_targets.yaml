targets:
  - id: P5-EDGE-001
    area: "Proof-carrying diagrams"
    priority: high
    status: exploratory_python
    claim_type: tooling
    title: "Glyph-to-theorem status compiler"
    edge_question: "Can a visual glyph resolve to theorem ids, Lean declarations, dictionary terms, and proof status without prose drift?"
    ordinary_baseline: "Static mathematical diagrams plus separate theorem statements."
    acceptance_criteria:
      - "A glyph manifest fixture resolves every theorem id and dictionary id."
      - "Unproved theorem ids render as planned/exploratory/blocked rather than proved."
      - "A Living Book page links the glyph fixture to the source manifest and Lean declarations."
    artifact_refs:
      - "papers/phase2/PAPER_P2_05_PROOF_CARRYING_GLYPHS.md"
      - "site/chapters/phase2/proof_carrying_glyphs.qmd"
    dictionary_dependencies: ["COMMON-0033"]
    next_action: "Generated glyph fixture now resolves proved and unproved theorem statuses; expand toward glyph syntax trees and normal forms."
    guardrail: "A diagram is an interface, not a proof."

  - id: P5-EDGE-002
    area: "Proof search and theorem discovery"
    priority: high
    status: exploratory_python
    claim_type: experiment
    title: "Finite-coil normal-form theorem search"
    edge_question: "Can finite-coil signatures expose useful theorem candidates or reduce search friction in bounded S1 modular domains?"
    ordinary_baseline: "Name/type search over theorem declarations and ordinary modular-arithmetic lemmas."
    acceptance_criteria:
      - "A Python fixture normalizes finite-circle examples to gcd, period, orbit count, and full-coil signatures."
      - "At least ten existing theorem ids are indexed by those signatures."
      - "A comparison notes which lookups are easier by signature and which are not."
    artifact_refs:
      - "papers/PAPER_01_FINITE_CIRCLES.md"
      - "papers/S1/PAPER_S1_04_FACTORS_SCALING_PRIME_COILS.md"
      - "circle_math/finite_search.py"
      - "sidecars/PAPER_01_FINITE_CIRCLES/python/test_finite_coil_search_examples.py"
    dictionary_dependencies: ["CC-0205", "CC-0206", "CC-0207", "CC-0208", "COMMON-0041"]
    next_action: "Bounded S1 theorem-signature index added; expand toward generated theorem metadata and compare against ordinary name/type lookup."
    guardrail: "Do not claim global theorem discovery from a bounded-domain index."

  - id: P5-EDGE-003
    area: "Number provenance and symbolic compression"
    priority: medium
    status: exploratory_python
    claim_type: experiment
    title: "Number provenance compression fixture"
    edge_question: "Can construction histories for a number compress or clarify divisor, factor, orbit, and proof navigation better than value-only presentation?"
    ordinary_baseline: "A numeric value plus separate factorization and theorem links."
    acceptance_criteria:
      - "A provenance object records at least divisor, cofactor, orbit-count, period, and theorem-link views for selected n."
      - "The fixture compares value-only lookup with provenance lookup on a small set of explanations."
      - "The paper text identifies where provenance adds clarity and where it adds noise."
    artifact_refs:
      - "papers/S1/PAPER_S1_04_FACTORS_SCALING_PRIME_COILS.md"
      - "circle_math/number_provenance.py"
      - "sidecars/PAPER_S1_04_FACTORS_SCALING_PRIME_COILS/python/test_number_provenance_examples.py"
    dictionary_dependencies: ["CC-0207", "CC-0208", "COMMON-0042"]
    next_action: "Minimal NumberProvenance fixture added for small finite circles; expand only when it improves explanations without adding noise."
    guardrail: "Standard mathematics already represents these facts; the claim is interface leverage only."

  - id: P5-EDGE-004
    area: "Cyclic and periodic data analysis"
    priority: high
    status: exploratory_python
    claim_type: experiment
    title: "Noisy and aliased coil-signature benchmark"
    edge_question: "Can coil closure profiles or prime-lag scans add useful diagnostics beyond autocorrelation and periodogram baselines?"
    ordinary_baseline: "Autocorrelation, periodogram/Fourier ranking, and known-period synthetic controls."
    acceptance_criteria:
      - "Noisy, aliased, and multi-period synthetic fixtures are deterministic."
      - "Coil closure, autocorrelation, and periodogram-style baselines are all reported."
      - "Negative or ambiguous results are recorded without upgrading claims."
    artifact_refs:
      - "papers/applications/PAPER_APP_01_COIL_DATA_ANALYSIS.md"
      - "circle_math/applications/coil_data.py"
      - "sidecars/PAPER_APP_01_COIL_DATA_ANALYSIS/python/test_phase_coordinate_examples.py"
    dictionary_dependencies: ["COMMON-0036", "COMMON-0037", "COMMON-0038", "COMMON-0043"]
    next_action: "APPD-B0002 adds deterministic noisy, aliased, multi-period, and periodogram-style baseline cases; next step is external periodogram/Fourier baselines and real-data guardrails."
    guardrail: "Benchmark results are not Lean proofs and do not imply real-data usefulness."

  - id: P5-EDGE-005
    area: "AI and ML inductive bias"
    priority: high
    status: exploratory_python
    claim_type: experiment
    title: "Learned phase-channel baseline comparison"
    edge_question: "Can explicit phase channels help only on tasks with real periodic structure, compared against ordinary learned baselines?"
    ordinary_baseline: "Dense learned features, standard positional features, RoPE-style encodings, and nonperiodic controls."
    acceptance_criteria:
      - "The benchmark includes positive periodic tasks and negative nonperiodic controls."
      - "CPU and optional MLX paths produce matching deterministic scores on the tiny fixture."
      - "The result report separates quality, runtime, parameter count, and interpretability."
    artifact_refs:
      - "papers/applications/PAPER_AI_01_CIRCLE_AI_ARCHITECTURES.md"
      - "circle_math/applications/circle_ai.py"
      - "sidecars/PAPER_AI_01_CIRCLE_AI_ARCHITECTURES/python/test_phase_channel_examples.py"
    dictionary_dependencies: ["COMMON-0026", "COMMON-0039", "COMMON-0044"]
    next_action: "AIA-B0002 adds periodic and nonperiodic learned-baseline controls; expand beyond scalar thresholds to dense, RoPE, cyclic-feature, and MLX model baselines."
    guardrail: "No claim that circles improve all AI."

  - id: P5-EDGE-006
    area: "Compute and rendering"
    priority: medium
    status: exploratory_python
    claim_type: experiment
    title: "Circular layout and sampling backend comparison"
    edge_question: "Can circular schedules improve locality, explainability, or verification for workloads that are already periodic or angular?"
    ordinary_baseline: "Direct dense traversal, ordinary stencil loops, FFT/NTT baselines, and standard angular sampling."
    acceptance_criteria:
      - "The CoilLayout validation grid expands to at least one workload-specific stencil or sampling fixture."
      - "Direct/dense baselines and circular-layout variants agree on expected outputs."
      - "Runtime observations are recorded as measurements, not proof claims."
    artifact_refs:
      - "papers/applications/PAPER_COMP_03_COIL_LAYOUT_STENCIL_NTT.md"
      - "papers/applications/PAPER_COMP_02_COIL_RAY_AND_SAMPLING.md"
      - "circle_math/applications/coil_compute.py"
      - "sidecars/PAPER_COMP_03_COIL_LAYOUT_STENCIL_NTT/python/test_stride_address_examples.py"
    dictionary_dependencies: ["COMMON-0020", "COMMON-0022", "COMMON-0040", "COMMON-0045"]
    next_action: "COMPL-B0002 adds a periodic-boundary stencil fixture; expand next toward angular sampling and repeated direct/dense/FFT/NTT/MLX backend measurements."
    guardrail: "Performance claims require direct baselines and repeated measurements."

  - id: P5-EDGE-007
    area: "Robotics, orientation, and physics-adjacent models"
    priority: medium
    status: exploratory_python
    claim_type: paper_improvement
    title: "Quaternion and Hopf orientation-debugging note"
    edge_question: "Can quaternion/Hopf/fiber language make orientation ambiguity, phase, and spin double-cover behavior easier to verify or debug?"
    ordinary_baseline: "Quaternion formulas, SO(3) conventions, and separate visualization tools."
    acceptance_criteria:
      - "The note gives a bounded orientation-debugging workflow tied to existing S3 theorem ids."
      - "It distinguishes quaternion algebra facts from SO(3) quotient/topology claims."
      - "At least one Python example shows q and -q sign ambiguity without claiming full robotics verification."
    artifact_refs:
      - "papers/S3/PAPER_S3_02_QUATERNION_COILS.md"
      - "papers/S3/PAPER_S3_03_HOPF_COILS.md"
      - "papers/S3/PAPER_S3_04_SPIN_DOUBLE_COVER_ROADMAP.md"
      - "sidecars/PAPER_S3_04_SPIN_DOUBLE_COVER_ROADMAP/python/test_spin_conjugation_examples.py"
    dictionary_dependencies: ["S3Q-0001", "S3H-0001", "S3S-0001", "S3S-0002"]
    next_action: "Orientation-debugging note and Python sign-ambiguity record added; future work needs a precise SO(3) quotient/vector-space model before stronger robotics claims."
    guardrail: "Do not claim a complete SO(3), robotics, gauge, or physics formalization."

