targets:
  - id: P7-PHYS-001
    area: "Proof-carrying finite physics"
    priority: high
    status: exploratory_python
    target_type: proof_program
    title: "Finite U(1)/Z_n lattice gauge Wilson-loop seed"
    question: "Can Circle Calculus turn finite gauge-link diagrams into proof-carrying path holonomy and closed-loop invariance artifacts?"
    ordinary_baseline: "Standard lattice gauge notation with link variables, Wilson loops, and separate prose or textbook derivations."
    acceptance_criteria:
      - "A finite graph model records vertex gauge choices, edge link phases, oriented paths, and closed loops."
      - "Python examples compute path holonomy, path reversal, path concatenation, and plaquette loops."
      - "Lean theorem targets are limited to finite path algebra and gauge-invariance facts."
      - "The Living Book labels diagrams and widgets as explanations unless corresponding theorem ids are proved."
    artifact_refs:
      - "docs/PHASE7_PHYSICS_AND_GENERATORS.md"
      - "Circle/Physics/LatticeGauge.lean"
      - "papers/physics/PAPER_PHYS_01_PROOF_CARRYING_LATTICE_GAUGE.md"
      - "sidecars/PAPER_PHYS_01_PROOF_CARRYING_LATTICE_GAUGE/python/test_lattice_gauge_examples.py"
      - "papers/phase2/PAPER_P2_03_BUNDLE_CALCULUS.md"
      - "papers/S3/PAPER_S3_03_HOPF_COILS.md"
    dictionary_dependencies: ["COMMON-0060", "COMMON-0061", "COMMON-0062", "COMMON-0063", "S3H-0002"]
    next_action: "Finite link-path record holonomy plus singleton, two-link, singleton-concat, three-link, four-link, empty-identity, concat-associativity, reversal-algebra, general boundary-checked append composability, first nonempty source/target laws, a checked finite path interface with explicit endpoints, identity laws, associative boundary-checked composition, checked-path holonomy laws, checked-to-link-path projection bridges, and closed checked-path gauge-invariance facts are now Lean-proved; next decide whether a full finite graph path category is worth adding."
    guardrail: "A finite gauge-link seed is not continuum electromagnetism, QED, Yang-Mills theory, or a physics prediction."

  - id: P7-PHYS-002
    area: "Geometric phase and holonomy"
    priority: high
    status: planned
    target_type: paper_program
    title: "Berry/Hopf holonomy primer"
    question: "Can the existing Hopf phase-fiber spine become a proof-status-safe reader path for geometric phase, hidden phase, and holonomy?"
    ordinary_baseline: "Separate treatments of Berry phase, fiber bundles, Bloch sphere, and Hopf fibration."
    acceptance_criteria:
      - "The paper clearly separates standard physics background from Circle Calculus interface claims."
      - "Existing Hopf theorem ids are linked without claiming a full topological fibration proof."
      - "At least one finite holonomy toy example is executable before any continuum claim is discussed."
      - "The Living Book warning explains that Python examples and diagrams are not physics proofs."
    artifact_refs:
      - "docs/PHASE7_PHYSICS_AND_GENERATORS.md"
      - "papers/S3/PAPER_S3_03_HOPF_COILS.md"
      - "papers/phase2/PAPER_P2_03_BUNDLE_CALCULUS.md"
    dictionary_dependencies: ["COMMON-0060", "COMMON-0063", "S3H-0001", "S3H-0002", "S3H-W0001"]
    next_action: "Draft a scoped holonomy primer that starts from finite loop phase and only then points to Berry/Hopf background."
    guardrail: "Do not claim Circle Calculus proves Berry phase, Aharonov-Bohm physics, or the full Hopf fibration before those objects are modeled."

  - id: P7-PHYS-003
    area: "Spin and orientation physics"
    priority: medium
    status: planned
    target_type: proof_program
    title: "Quaternion spin quotient extension"
    question: "Can the current q/-q sign-cancellation proof grow into a verified spin/orientation lesson without overclaiming SO(3)?"
    ordinary_baseline: "Quaternion rotation formulas, rotation matrices, and separate sign-convention debugging tools."
    acceptance_criteria:
      - "The next theorem targets model pure-imaginary vectors, norm preservation, and action composition only when the formal vector model is ready."
      - "The paper keeps q/-q representative equality distinct from a completed SO(3) quotient."
      - "Python orientation records compare raw representative state with action-equivalent state."
    artifact_refs:
      - "docs/PHASE7_PHYSICS_AND_GENERATORS.md"
      - "papers/S3/PAPER_S3_02_QUATERNION_COILS.md"
      - "papers/S3/PAPER_S3_04_SPIN_DOUBLE_COVER_ROADMAP.md"
    dictionary_dependencies: ["COMMON-0060", "S3Q-0001", "S3S-0001", "S3S-0002"]
    next_action: "Audit the S3 spin sidecar for the smallest next Lean theorem that improves orientation physics without requiring full SO(3)."
    guardrail: "Do not claim a complete Spin(3), SO(3), spinor, or quantum-spin formalization from the current sign-cancellation seed."

