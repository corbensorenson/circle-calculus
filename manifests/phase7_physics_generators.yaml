  - id: P7-GEN-001
    area: "Generative structure and constructive compression"
    priority: high
    status: exploratory_python
    target_type: proof_program
    title: "Minimal generator provenance"
    question: "Can Circle Calculus represent an object by a small seed plus checked rules that regenerate the object, with proof status and provenance attached?"
    ordinary_baseline: "Value-only objects, finished diagrams, ordinary compressed files, or informal procedural descriptions."
    acceptance_criteria:
      - "A generator record stores seed, rule set, iteration schedule, closure condition, generated object, theorem ids, and dictionary ids."
      - "Python examples regenerate finite circles, finite-circle diagrams, finite physics-loop diagrams, coils, orbit decompositions, or glyph fixtures exactly from generator records."
      - "Lean targets prove finite generation/equality/closure facts where tractable."
      - "The paper states the minimization criterion before using the word minimal."
    artifact_refs:
      - "docs/PHASE7_PHYSICS_AND_GENERATORS.md"
      - "Circle/Generative/SeedRule.lean"
      - "papers/generative/PAPER_GEN_01_SEED_RULE_PROVENANCE.md"
      - "sidecars/PAPER_GEN_01_SEED_RULE_PROVENANCE/python/test_seed_rule_provenance_examples.py"
      - "papers/S1/PAPER_S1_04_FACTORS_SCALING_PRIME_COILS.md"
      - "papers/phase2/PAPER_P2_05_PROOF_CARRYING_GLYPHS.md"
    dictionary_dependencies: ["COMMON-0042", "COMMON-0064", "COMMON-0065", "COMMON-0066", "COMMON-0033"]
    next_action: "Exact representative-indexed orbit-decomposition regeneration, comparison gates, and the first generated-diagram Living Book widget are in place; next extend the widget contract toward orbit-family and proof-glyph records while keeping minimality claims scoped to explicit search spaces."
    guardrail: "A smaller generator is not automatically optimal, meaningful, or new mathematics."

