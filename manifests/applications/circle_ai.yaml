next_targets:
  - >-
    Use COMMON-0052 through COMMON-0055 and COMMON-0059 as the looped/recursive transformer roadmap lane:
    AIA/AIM/AIRA proofs cover finite indexing and loop-budget schedule facts only, while AIM-B0003 provides
    a deterministic recurrence-schedule fixture with single-pass, fixed-loop, adaptive-exit, recurrent-memory,
    sparse phase-router, over-looped, and dense-threshold controls, AIM-B0005 records token-level budgets,
    active-token counts, selected middle block, resolution labels, and wrong/over-loop controls, AIM-B0012
    adds learned token-level recurrence routing with a phase-to-budget lookup, wrong-period, shifted-budget,
    fixed-budget, over-loop, and nonperiodic scalar controls, AIM-B0013 adds learned middle-block recurrence
    routing with separate phase-to-block and phase-to-budget lookups plus wrong-period, selected-band,
    full-block, fixed-budget, wrong-block, and over-loop controls, AIM-B0014 adds learned multi-resolution
    recurrence routing with phase-to-budget and phase-to-resolution lookups plus single-resolution,
    fixed-budget, wrong-period, and over-loop controls, AIM-B0006
    adds a deterministic training-free loop-wrapper fixture with CPU/optional-MLX scoring, fixed-loop,
    wrong-period, over-loop, and scalar-threshold baselines, and AIM-B0007 adds a middle-block recurrence
    fixture with selected-block, full-block, fixed-budget, wrong-block, and over-loop controls, and AIM-B0008
    adds a multi-resolution recurrence fixture with single-resolution, fixed-budget, wrong-resolution, and
    over-loop controls, AIM-B0009 adds a learned recurrence-schedule fixture with fixed-budget,
    wrong-period, and over-loop controls, and AIM-B0011 records loop-exit certificate traces, budget status,
    and overthinking guardrails; compare future learned models against dense transformer, Universal Transformer,
    fixed looped-transformer, adaptive-exit, recurrent-memory, token-level Mixture-of-Recursions,
    middle-block recurrence, multi-resolution recurrence,
    sparse/MoE, RWKV/Mamba-style, and standard state-space baselines.
  - "AIA-B0004 expands the learned phase fixture to dense-scalar, learned-position, wrong-period, and cyclic-feature baselines; AIA-B0005 adds a correct-frequency versus wrong-frequency harmonic/Fourier feature scaffold; next compare against standard RoPE, learned positional encodings, and learned dense models before model-quality claims."
  - "Use AIM-B0002 as fixed coil-retrieval reachability scaffolding, AIM-B0004 as hand-coded content-gated coil/local routing scaffolding, and AIM-B0010 as learned route-table scaffolding only; expand toward learned gates, alias-control, full-attention, sparse-attention, Hyena-like, recurrent-memory, and state-space baselines before retrieval-quality claims."
  - "Use AIRA-B0001 as adapter-block scaffolding, AIRA-B0004 as adapter parameter-budget scaffolding, and AIRA-B0005 as CoilLinear/circulant-mixer scaffolding only; expand toward CoilRA, block-circulant, LoRA, dense-adapter, learned quality, runtime, memory, and training-stability baselines before making parameter-efficiency or quality claims."
  - "Use AIRA-B0002 as MultiCoil/RoPE-style positional scaffolding and AIRA-B0003 as relative RoPE-style phase scaffolding only; expand toward standard RoPE, learned positional encodings, attention, dense sequence, Fourier-feature, and MLX/CPU parity baselines before model-quality claims."
  - "Use AIA-B0003 as CPU/MLX scoring parity scaffolding only; expand toward actual MLX model prototypes and timing only after parity and baseline semantics are stable."
  - "Compare against dense, LoRA, block-circulant, standard RoPE, learned positional encoding, full attention, sparse attention, Hyena-like, recurrent-memory, looped-transformer, state-space, convolutional, Fourier-feature, and MLX/CPU parity baselines as appropriate."
  - "Use docs/THESEUS_HIVE_AI_TRANSFER.md and P5-EDGE-011 as the Theseus-Hive transfer lane: site/data/generated/theseus_hive_ai_contracts.json now exports Circle recurrence, memory-slot, stride-coverage, phase-feature, circulant-mixer, and seed-rule contracts as public fixtures, and the companion Theseus-Hive workspace has report-only consumers that emit YELLOW private-planning, structural-smoke, deterministic-proxy, aggregate real-workload attachment, scored candidate-manifest, semantic score-context, full-frontier equal-budget semantic execution, recurrence work-budget, context-memory, and phase-feature reports with separate quality, runtime, memory, parameter, interpretability, transfer, failure-case, named workload, proxy metric, aggregate local-artifact, scored manifest-gate, imported semantic pass-rate, fresh private semantic execution, recurrence budget, context-packet retention, and phase-feature ablation fields; current scored ids are circle_candidate_fanout_scored_manifest_v1, circle_candidate_fanout_semantic_frontier_v1, circle_candidate_fanout_equal_budget_semantic_v1, circle_recurrence_work_budget_semantic_v1, circle_memory_context_packet_retrieval_v1, and circle_phase_feature_sequence_ablation_v1. The full-frontier fanout and recurrence runs both score 1040 private tasks while tying ordinary rank-one/fixed-depth baselines, the memory run scores 37 context-packet targets while equal-budget Circle retention ties ordinary retention baselines, and the phase run scores 9750 private sequence/category rows while Circle periods, wrong periods, and no-phase majority all report accuracy 0.528205; next design Circle selection, recurrence-depth, downstream retrieval, or route/ranker phase workloads that differ from ordinary baselines when evidence supports it, and promote the mixer and seed-rule attachments into scored private workloads against dense/low-rank mixer and object-storage baselines without upgrading benchmark evidence to proof status."
