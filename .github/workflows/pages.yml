name: Deploy Living Book

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build verified site artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Lean and build proofs
        uses: leanprover/lean-action@v1
        with:
          build: true
          test: false
          lint: false
          use-github-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: python -m pip install -e .

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Run source-of-truth checks
        run: make sourcecheck

      - name: Render Living Book
        run: make site-render

      - name: Verify rendered Living Book artifact
        run: make site-render-check

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Living Book artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/_site

  deploy:
    name: Deploy to GitHub Pages
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy artifact
        id: deployment
        uses: actions/deploy-pages@v4
