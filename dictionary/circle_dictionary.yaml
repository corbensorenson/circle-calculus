entries:
  - id: CC-0001
    name: Circle
    kind: object
    symbol: C_n
    formal_definition: "In v0, C_n is the finite cyclic address space modeled as ZMod n, with n > 0 for finite marked circles."
    intuition: "A closed address space whose positions wrap around."
    dependencies: []
    rewrite_rules: []
    formal_models: ["ZMod n", "integers modulo n", "finite cyclic group"]
    lean_declarations: ["Circle.C"]
    python_objects: ["circle_math.finite.Circle"]
    introduced_in: "Paper 1"
    forbidden_meanings:
      - "A Euclidean metric circle in v0."
      - "A set of planar points at fixed radius in v0."
    examples: ["C_12 as a clock", "C_13 as a prime circle"]

  - id: CC-0002
    name: Node
    kind: object
    symbol: "node(n,i)"
    formal_definition: "An element of C_n, represented by the residue class of i modulo n."
    intuition: "A marked address on the circle."
    dependencies: ["CC-0001"]
    rewrite_rules: ["node(n,i) = node(n, i mod n)"]
    formal_models: ["element of ZMod n"]
    lean_declarations: ["Circle.Node"]
    python_objects: ["Circle.node"]
    introduced_in: "Paper 1"
    forbidden_meanings:
      - "A geometric point in a plane unless a later geometry model is explicitly active."
    examples: ["node(12,14)=node(12,2)"]

  - id: CC-0101
    name: Rotation
    kind: operation
    symbol: "rot(n,k)"
    formal_definition: "rot(n,k)(x) = x + k in C_n."
    intuition: "Move k steps around the circle."
    dependencies: ["CC-0001", "CC-0002"]
    rewrite_rules:
      - "rot(n,0)=identity"
      - "rot(n,a) after rot(n,b)=rot(n,a+b)"
      - "rot(n,k+n)=rot(n,k)"
    formal_models: ["addition by k in ZMod n"]
    lean_declarations: ["Circle.rot", "Circle.rot_zero", "Circle.rot_comp"]
    python_objects: ["Circle.rot"]
    introduced_in: "Paper 1"
    forbidden_meanings:
      - "Physical spinning unless a later model interprets it physically."
    examples: ["rot(12,5)(8)=1"]

  - id: CC-0105
    name: Scaling
    kind: operation
    symbol: "scale(n,k)"
    formal_definition: "scale(n,k)(x) = k*x in C_n."
    intuition: "Multiply every circle address by the same factor."
    dependencies: ["CC-0001", "CC-0002"]
    rewrite_rules:
      - "scale(n,0)=zero map"
      - "scale(n,1)=identity"
      - "scale(n,a) after scale(n,b)=scale(n,a*b)"
      - "if k and l are congruent mod n, then scale(n,k)=scale(n,l)"
      - "scale(n,k) after rot(n,stride)=rot(n,k*stride) after scale(n,k)"
      - "scale(n,k) maps coil(n,stride,start) steps to coil(n,k*stride,k*start) steps"
      - "scale(n,k)(steps)=coil_step(n,k,0,steps) for natural step representatives"
      - "scale(n,k) is invertible iff gcd(n,k)=1"
      - "if p is prime and 1<=k<p, then scale(p,k) is bijective"
      - "if k divides n, then scale(n,k)(n/k)=0 in C_n"
      - "if k divides n, then scale(n,k)(m*(n/k))=0 in C_n"
      - "if k divides n, then scale(n,k)(x+m*(n/k))=scale(n,k)(x)"
      - "scale(n,k)(x)=0 iff n divides k*x for natural representatives"
      - "for n != 0, scale(n,k)(x)=0 iff period(n,k) divides x for natural representatives"
      - "for n != 0, scale(n,k)(m*period(n,k))=0"
      - "for n != 0, scale(n,k)(x+m*period(n,k))=scale(n,k)(x)"
      - "for n != 0, scale(n,k)(x)=scale(n,k)(x mod period(n,k))"
      - "scale(n,k)(x)=scale(n,k)(y) iff k*x and k*y are congruent mod n for natural representatives"
      - "for n != 0, scale(n,k)(x)=scale(n,k)(y) iff x and y are congruent mod period(n,k)"
      - "for n != 0 and x,y < period(n,k), scale(n,k)(x)=scale(n,k)(y) iff x=y"
      - "for n != 0, card(scale_period_representative_image(n,k))=period(n,k)"
      - "if gcd(n,k)=1, then scale(n,k)(x)=scale(n,k)(y) iff x and y are congruent mod n"
    formal_models: ["left multiplication by (k : ZMod n)"]
    lean_declarations: ["Circle.scale", "Circle.scale_zero_factor", "Circle.scale_one", "Circle.scale_comp", "Circle.scale_rot", "Circle.scale_coilStep", "Circle.scale_nat_to_coilStep", "Circle.scale_invertible_iff_coprime", "Circle.prime_scale_bijective", "Circle.scale_cofactor_zero", "Circle.scale_cofactor_multiple_zero", "Circle.scale_add_cofactor_multiple", "Circle.scale_nat_eq_zero_iff_dvd_mul", "Circle.scale_nat_eq_zero_iff_period_dvd", "Circle.scale_period_multiple_zero", "Circle.scale_add_period_multiple", "Circle.scale_nat_period_normalForm", "Circle.scale_nat_eq_iff_mul_modEq", "Circle.scale_nat_eq_iff_period_modEq", "Circle.scale_nat_period_representatives_injective", "Circle.scalePeriodRepresentativeImage", "Circle.scalePeriodRepresentativeImage_card", "Circle.scale_nat_eq_iff_nat_modEq_of_coprime", "Circle.scale_factor_modEq"]
    python_objects: ["Circle.scale", "Circle.scale_is_permutation"]
    introduced_in: "PAPER_S1_04_FACTORS_SCALING_PRIME_COILS"
    forbidden_meanings:
      - "A geometric dilation unless a later geometry model explicitly interprets it that way."
      - "A proof of multiplication laws not linked to a theorem id."
    examples: ["scale(12,0)(7)=0", "scale(12,5)(7)=11", "scale(12,17)=scale(12,5) because 17 is congruent to 5 mod 12", "scale(12,4)(3)=coil_step(12,4,0,3)", "scale(12,4) is not invertible", "scale(13,5) is invertible because 13 is prime and 1<=5<13", "scale(12,4)(3)=0 because 4 divides 12", "scale(12,4)(6)=0 as a second cofactor multiple", "scale(12,4)(8)=scale(12,4)(5) because 8=5+1*(12/4)", "scale(12,4)(9)=0 because 12 divides 4*9", "scale(12,4)(x)=0 exactly when period(12,4)=3 divides x", "scale(12,4)(6)=0 because 6=2*period(12,4)", "scale(12,4)(8)=scale(12,4)(5) because 8=5+period(12,4)", "scale(12,4)(20)=scale(12,4)(20 mod period(12,4))", "scale(12,4)(2)=scale(12,4)(5) exactly because 2 and 5 are congruent mod period(12,4)=3", "on representatives 0,1,2 below period(12,4)=3, scale(12,4) is injective", "scale_period_representative_image(12,4) has card 3", "scale(12,4)(2)=scale(12,4)(5) because 8 and 20 are congruent mod 12", "scale(12,5)(2)=scale(12,5)(14) exactly because 2 and 14 are congruent mod 12"]

  - id: CC-0201
    name: Coil
    kind: object
    symbol: "coil(n,k,start)"
    formal_definition: "The orbit {start + t*k mod n | t in Nat}."
    intuition: "The path traced by repeatedly applying the same rotation."
    dependencies: ["CC-0101"]
    rewrite_rules: []
    formal_models: ["additive orbit in ZMod n"]
    lean_declarations: ["Circle.coilStep"]
    python_objects: ["Circle.orbit"]
    introduced_in: "Paper 1"
    forbidden_meanings:
      - "A visual spiral without a formal orbit rule."
    examples: ["coil(12,4,0) = 0 -> 4 -> 8 -> 0"]

  - id: CC-0202
    name: Closure
    kind: relation
    symbol: "closed(coil)"
    formal_definition: "A coil closes at step m when start + m*k = start in C_n."
    intuition: "The repeated motion has returned to its start address."
    dependencies: ["CC-0201"]
    rewrite_rules: ["start + m*k = start iff m*k = 0 in C_n"]
    formal_models: ["zero multiple condition in ZMod n"]
    lean_declarations: ["Circle.closesAt", "Circle.closesAt_iff_stride_multiple_zero"]
    python_objects: ["Circle.orbit"]
    introduced_in: "Paper 1"
    forbidden_meanings:
      - "Topological closure in v0."
    examples: ["stride 4 on C_12 closes after 3 steps"]

  - id: CC-0205
    name: Period
    kind: relation
    symbol: "period(n,k)"
    formal_definition: "The least positive m such that m*k = 0 in C_n; in Lean v0, addOrderOf (k : ZMod n)."
    intuition: "How many steps before the coil returns."
    dependencies: ["CC-0201", "CC-0202"]
    rewrite_rules: ["period(n,k)=n/gcd(n,k) for n != 0"]
    formal_models: ["additive order in ZMod n"]
    lean_declarations: ["Circle.period"]
    python_objects: ["Circle.period"]
    introduced_in: "Paper 1"
    forbidden_meanings:
      - "The length of a drawn curve."
    examples: ["period(12,4)=3", "period(13,5)=13"]

  - id: CC-0206
    name: Full Coil
    kind: relation
    symbol: "full_coil(n,k)"
    formal_definition: "A stride-k coil is full when its period is n, equivalently when it visits every node before returning."
    intuition: "One repeated stride covers the whole circle."
    dependencies: ["CC-0201", "CC-0205"]
    rewrite_rules: ["full_coil(n,k) iff period(n,k)=n"]
    formal_models: ["generator of a cyclic additive group"]
    lean_declarations: ["Circle.fullCoil"]
    python_objects: ["Circle.is_full_coil"]
    introduced_in: "Paper 1"
    forbidden_meanings:
      - "A visually dense continuous curve."
    examples: ["stride 5 on C_13 is a full coil"]

  - id: CC-0207
    name: Orbit Class
    kind: object
    symbol: "C_n / orbitSubgroup(n,k)"
    formal_definition: "In v0, a stride-k orbit class is a coset of the additive subgroup generated by k in C_n."
    intuition: "One of the disjoint cycles produced by repeatedly moving by the same stride."
    dependencies: ["CC-0001", "CC-0101", "CC-0201"]
    rewrite_rules:
      - "two nodes lie in the same orbit class iff their difference is an integer multiple of the stride in C_n"
    formal_models: ["quotient of ZMod n by AddSubgroup.zmultiples (k : ZMod n)"]
    lean_declarations: ["Circle.orbitSubgroup", "Circle.orbitClassQuotient"]
    python_objects: ["Circle.orbit_decomposition"]
    introduced_in: "Paper 1"
    forbidden_meanings:
      - "A connected component of a topological space."
      - "A visual cycle without the generated-subgroup equivalence relation."
    examples: ["stride 4 on C_12 has four orbit classes"]

  - id: CC-0208
    name: Orbit Class Count
    kind: relation
    symbol: "orbit_class_count(n,k)"
    formal_definition: "The number of cosets of the additive subgroup generated by k in C_n."
    intuition: "How many disjoint stride cycles the circle splits into."
    dependencies: ["CC-0205", "CC-0207"]
    rewrite_rules:
      - "orbit_class_count(n,k)=gcd(n,k) for n != 0"
    formal_models: ["Nat.card (C_n quotient AddSubgroup.zmultiples stride)"]
    lean_declarations: ["Circle.orbitClassCount", "Circle.orbit_decomposition_count"]
    python_objects: ["Circle.orbit_decomposition"]
    introduced_in: "Paper 1"
    forbidden_meanings:
      - "The length of one orbit."
      - "The number of rendered arrows in a diagram."
    examples: ["orbit_class_count(12,4)=4", "orbit_class_count(13,5)=1"]

  - id: CC-0301
    name: Winding
    kind: object
    symbol: "lifted_node(n,q,r)"
    formal_definition: "A lifted node records q full rotations and residue r, representing q*n+r."
    intuition: "Counting without losing full-turn information modulo n."
    dependencies: ["CC-0001", "CC-0002"]
    rewrite_rules: ["value(lifted_node(n,q,r)) = q*n+r"]
    formal_models: ["Euclidean division by n"]
    lean_declarations: ["Circle.LiftedNode", "Circle.LiftedNode.value", "Circle.liftWinding", "Circle.liftResidue", "Circle.lift_unique"]
    python_objects: ["circle_math.winding.LiftedNode", "circle_math.winding.lift"]
    introduced_in: "Paper 2"
    forbidden_meanings:
      - "A continuous spiral coordinate in v0."
    examples: ["17 steps around C_5 = lifted_node(5,3,2)"]

  - id: CC-0302
    name: Successor With Carry
    kind: operation
    symbol: "succ_lift(n,value)"
    formal_definition: "The lifted successor operation increments the residue by one and carries into the winding when the residue crosses the modulus."
    intuition: "One more step around the finite circle, preserving full-turn count."
    dependencies: ["CC-0301"]
    rewrite_rules:
      - "succ_lift(n,value).value = value + 1 for n != 0"
      - "succ_lift(n,value).residue = (residue(value)+1) mod n"
      - "succ_lift(n,value).winding = winding(value) + ((residue(value)+1) / n)"
    formal_models: ["successor expressed through quotient/remainder arithmetic"]
    lean_declarations:
      - "Circle.liftSuccCarry"
      - "Circle.liftSuccWinding"
      - "Circle.liftSuccResidue"
      - "Circle.lift_successor_decomposition"
    python_objects: ["circle_math.winding.lift_successor"]
    introduced_in: "Paper 2"
    forbidden_meanings:
      - "Integer successor with negative orientation."
      - "A physical jump between geometric points without the quotient/remainder rule."
    examples: ["succ_lift(5,17) = lifted_node(5,3,3)", "succ_lift(5,19) = lifted_node(5,4,0)"]

  - id: CC-0303
    name: Lifted Addition
    kind: operation
    symbol: "add_lift(n,left,right)"
    formal_definition: "Lifted addition concatenates two natural path counts by adding their winding components, adding their residues, and carrying residue overflow into the winding count."
    intuition: "Walk one lifted path, then keep walking the second; full turns and leftover address combine with carry."
    dependencies: ["CC-0301"]
    rewrite_rules:
      - "add_lift(n,left,right).value = left + right for n != 0"
      - "add_lift(n,left,right).residue = (residue(left)+residue(right)) mod n"
      - "add_lift(n,left,right).winding = winding(left)+winding(right)+((residue(left)+residue(right))/n)"
      - "add_lift(n,value,0) = lifted_node(n,winding(value),residue(value))"
      - "add_lift(n,0,value) = lifted_node(n,winding(value),residue(value))"
    formal_models: ["natural-number addition expressed through quotient/remainder arithmetic"]
    lean_declarations:
      - "Circle.liftAddCarry"
      - "Circle.liftAddWinding"
      - "Circle.liftAddResidue"
      - "Circle.lift_add_decomposition"
      - "Circle.lift_add_zero_right"
      - "Circle.lift_add_zero_left"
      - "Circle.lift_add_assoc_value"
    python_objects: ["circle_math.winding.lift_add"]
    introduced_in: "Paper 2"
    forbidden_meanings:
      - "Integer addition with negative orientation."
      - "Vector addition in a geometric plane."
    examples: ["add_lift(5,17,8) = lifted_node(5,5,0)"]

  - id: CC-0304
    name: Iterated Lifted Successor
    kind: operation
    symbol: "iter_succ_lift(n,value,steps)"
    formal_definition: "Repeated application of the lifted successor transition to a valid winding/residue state."
    intuition: "Induction as taking one unit step at a time around the lifted circle."
    dependencies: ["CC-0301", "CC-0302"]
    rewrite_rules:
      - "iter_succ_lift(n,value,steps).value = value + steps for n != 0"
      - "iter_succ_lift(n,value,steps).residue < n for n != 0"
    formal_models: ["primitive recursion over Nat using quotient/remainder successor"]
    lean_declarations:
      - "Circle.liftSuccPair"
      - "Circle.liftIterSuccPair"
      - "Circle.lift_succ_pair_decomposition"
      - "Circle.lift_iter_successor_decomposition"
    python_objects: ["circle_math.winding.lift_iter_successor"]
    introduced_in: "Paper 2"
    forbidden_meanings:
      - "Transfinite induction."
      - "Continuous-time flow."
    examples: ["iter_succ_lift(5,17,8) = lifted_node(5,5,0)"]

  - id: CC-9001
    name: Theorem Manifest
    kind: model
    symbol: "theorem_manifest.yaml"
    formal_definition: "The source-of-truth metadata file for theorem ids, Lean names, proof status, paper references, dictionary dependencies, and verification requirements."
    intuition: "The ledger that prevents papers from outrunning proofs."
    dependencies: []
    rewrite_rules: []
    formal_models: ["YAML theorem registry"]
    lean_declarations: []
    python_objects: ["scripts.check_manifest"]
    introduced_in: "Stage 0"
    forbidden_meanings:
      - "A proof by itself."
    examples: ["CC-T0001 maps to Circle.rot_zero"]

  - id: CC-9002
    name: Proof Sidecar
    kind: model
    symbol: "sidecars/PAPER_ID/lean"
    formal_definition: "A per-paper directory containing Lean files that state, check, or re-export the formal declarations cited by that paper."
    intuition: "The machine-checkable companion to a paper."
    dependencies: ["CC-9001"]
    rewrite_rules: []
    formal_models: ["Lean source files"]
    lean_declarations: []
    python_objects: []
    introduced_in: "Stage 0"
    forbidden_meanings:
      - "An informal appendix with no proof checker."
    examples: ["sidecars/PAPER_01_FINITE_CIRCLES/lean/Paper01.lean"]

  - id: CC-9003
    name: Python Sidecar
    kind: model
    symbol: "sidecars/PAPER_ID/python"
    formal_definition: "A per-paper directory containing executable examples, tests, and diagram-generation code that supports but does not prove the paper's claims."
    intuition: "The runnable intuition layer beside the proof layer."
    dependencies: ["CC-9001"]
    rewrite_rules: []
    formal_models: ["Python tests and scripts"]
    lean_declarations: []
    python_objects: []
    introduced_in: "Stage 0"
    forbidden_meanings:
      - "A formal proof sidecar."
    examples: ["sidecars/PAPER_01_FINITE_CIRCLES/python/test_paper_01_examples.py"]

  - id: CC-W005
    name: Godel Escape Fallacy
    kind: warning
    symbol: ""
    formal_definition: "The invalid claim that a new encoding avoids incompleteness merely by changing notation or representation."
    intuition: "Circle encodings can arithmetize syntax, but they do not evade Godel boundaries."
    dependencies: []
    rewrite_rules: []
    formal_models: ["metatheory warning"]
    lean_declarations: []
    python_objects: []
    introduced_in: "Paper 9"
    forbidden_meanings:
      - "A proof that Circle Calculus is complete for all arithmetic truth."
    examples: ["Godel coil numbering must be treated as arithmetization, not escape."]
