    dependencies: ["S456-0001"]
    introduced_in: "PAPER_S6_01_OCTONION_SHADOW_AND_WARNINGS"
    forbidden_meanings:
      - "A resolved complex-structure claim."
  - id: S6-W0001
    name: "S6 complex-structure warning"
    kind: warning
    formal_definition: "Claims about integrable complex structures on S^6 are not project assumptions unless formalized from accepted foundations."
    intuition: "Do not build on delicate unresolved S^6 claims."
    dependencies: ["S6-0001"]
    introduced_in: "PAPER_S6_01_OCTONION_SHADOW_AND_WARNINGS"
    forbidden_meanings:
      - "Settling the S^6 complex-structure problem by roadmap language."

