entries:
  - id: S3C-0001
    name: "Finite 3-sphere suspension model"
    kind: object
    formal_definition: "The finite S^3 suspension count model `Circle.S3.suspendedSuspendedCircleCounts`, with Euler characteristic proved by `Circle.S3.suspendedSuspendedCircle_chi`."
    intuition: "The combinatorial topological S^3 layer before quaternion algebra."
    dependencies: ["COMMON-0003", "S2-0001"]
    introduced_in: "PAPER_S3_01_FINITE_HYPERSPHERES"
    forbidden_meanings:
      - "A visual 4D projection treated as a proof."
  - id: S3Q-0001
    name: "Quaternion model"
    kind: model
    formal_definition: "The algebraic S^3 track using real quaternions `Circle.S3.RealQuaternion = Quaternion ℝ` and the norm-square map `Circle.S3.quaternionNorm`."
    intuition: "S^3 as the first higher sphere with native associative but noncommutative multiplication."
    dependencies: []
    introduced_in: "PAPER_S3_02_QUATERNION_COILS"
    forbidden_meanings:
      - "A commutative multiplication system."
      - "An octonion model."
  - id: S3Q-0002
    name: "Unit quaternion"
    kind: object
    formal_definition: "A real quaternion bundled with a proof that `Circle.S3.quaternionNorm q = 1`."
    intuition: "A point of the algebraic S^3 model."
    dependencies: ["S3Q-0001"]
    introduced_in: "PAPER_S3_02_QUATERNION_COILS"
    forbidden_meanings:
      - "An arbitrary non-unit quaternion."
  - id: S3Q-0003
    name: "Quaternion noncommutativity"
    kind: relation
    formal_definition: "The formal example `Circle.S3.quaternion_noncommutative_example`, proving that `i*j != j*i` in integer quaternions."
    intuition: "S^3: order matters."
    dependencies: ["S3Q-0001"]
    introduced_in: "PAPER_S3_02_QUATERNION_COILS"
    forbidden_meanings:
      - "Nonassociativity."
  - id: S3H-0001
    name: "Hopf map"
    kind: operation
    formal_definition: "The coordinate map `Circle.S3.hopfMap : Circle.S3.HopfPair -> Circle.S3.HopfBasePoint`, with `Circle.S3.hopfMap_lands_sphere` proving that normalized pairs land on the unit base equation."
    intuition: "A visible S^2 base with hidden S^1 phase fibers."
    dependencies: ["S3Q-0001", "S2-0001"]
    introduced_in: "PAPER_S3_03_HOPF_COILS"
    forbidden_meanings:
      - "A proof that S^3 is globally S^2 x S^1."
  - id: S3H-0002
    name: "Hopf phase fiber"
    kind: object
    formal_definition: "The common unit-phase action `Circle.S3.phaseRotatePair`; `Circle.S3.hopfMap_phase_invariant` proves it preserves the Hopf base coordinates."
    intuition: "The hidden circle above each visible base point."
    dependencies: ["S3H-0001", "S1-0001"]
    introduced_in: "PAPER_S3_03_HOPF_COILS"
    forbidden_meanings:
      - "A global product decomposition."
  - id: S3H-W0001
    name: "Hopf not product warning"
    kind: warning
    formal_definition: "The Hopf fibration is locally product-like but S^3 is not globally S^2 x S^1."
    intuition: "Hidden phase is twisted globally."
    dependencies: ["S3H-0001"]
    introduced_in: "PAPER_S3_03_HOPF_COILS"
    forbidden_meanings:
      - "Declaring S^3 equal to S^2 x S^1."
  - id: S3S-0001
    name: "Quaternion conjugation action"
    kind: operation
    formal_definition: "The real-quaternion action `Circle.S3.quaternionConjugationAction q v = q * v * star q`."
    intuition: "The algebraic core of rotating by conjugation before quotienting signs."
    dependencies: ["S3Q-0001", "S3Q-0002"]
    introduced_in: "PAPER_S3_04_SPIN_DOUBLE_COVER_ROADMAP"
    forbidden_meanings:
      - "A complete SO(3) formalization by itself."
  - id: S3S-0002
    name: "Quaternion sign ambiguity"
    kind: relation
    formal_definition: "`q` and `-q` give the same value under `Circle.S3.quaternionConjugationAction`."
    intuition: "The first formal shadow of the spin double cover: opposite unit quaternions act the same."
    dependencies: ["S3S-0001"]
    introduced_in: "PAPER_S3_04_SPIN_DOUBLE_COVER_ROADMAP"
    forbidden_meanings:
      - "A claim that `q = -q`."
