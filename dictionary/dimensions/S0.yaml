entries:
  - id: S0-0001
    name: "Two-point opposition"
    kind: object
    symbol: "S^0"
    formal_definition: "The finite S^0 model consisting of exactly two opposed points, represented in Lean by Circle.S0.Sign."
    intuition: "The smallest sphere-like opposition pair."
    dependencies: []
    introduced_in: "PAPER_S0_01_TWO_POINT_OPPOSITION"
    forbidden_meanings:
      - "The one-node circle C_1."
      - "A degenerate finite circle."
  - id: S0-0002
    name: "S0 antipode"
    kind: operation
    formal_definition: "The finite map Circle.S0.antipode that swaps the two points of S^0."
    intuition: "Opposition as an involutive flip."
    dependencies: ["S0-0001"]
    introduced_in: "PAPER_S0_01_TWO_POINT_OPPOSITION"
    forbidden_meanings:
      - "A rotation on C_1."
      - "A continuous sphere map without a finite model."
  - id: S0-W0001
    name: "C1 is not S0 warning"
    kind: warning
    formal_definition: "C_1 is a one-node finite cyclic address object; S^0 is a two-point opposition object."
    intuition: "The topological base sphere and the degenerate one-node circle are different objects."
    dependencies: ["S0-0001", "CC-0001"]
    introduced_in: "PAPER_S0_01_TWO_POINT_OPPOSITION"
    forbidden_meanings:
      - "Identifying one point with two opposed points."
