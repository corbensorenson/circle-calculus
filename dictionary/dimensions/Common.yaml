    symbol: "GaugeLink(C_n, graph)"
    formal_definition: "A planned finite graph model whose oriented edges carry cyclic phase/link values and whose vertices carry gauge choices, intended as the first Circle Calculus seed for finite path holonomy and closed-loop invariance."
    intuition: "Put phase data on the links of a finite graph, then track what changes under a gauge choice and what survives around a closed loop."
    dependencies: ["CC-0001", "COMMON-0060"]
    introduced_in: "PHASE7_PHYSICS_AND_GENERATORS"
    forbidden_meanings:
      - "A continuum gauge field."
      - "A proof of electromagnetism, QED, or Yang-Mills theory."
      - "A physics prediction."
  - id: COMMON-0062
    name: "Wilson-loop certificate"
    kind: interface
    symbol: "WilsonLoopCert(path, holonomy, theorem)"
    formal_definition: "A planned certificate record for a closed finite path whose link-phase product or sum is paired with gauge-invariance theorem ids and source artifacts when those theorems exist."
    intuition: "A closed loop should expose the accumulated phase and the checked reason it is invariant under allowed finite gauge changes."
    dependencies: ["COMMON-0060", "COMMON-0061"]
    introduced_in: "PHASE7_PHYSICS_AND_GENERATORS"
    forbidden_meanings:
      - "A continuum Wilson loop expectation value."
      - "A confinement, QFT, or lattice-simulation result."
      - "A proved certificate before the linked theorem id is Lean-proved."
  - id: COMMON-0063
    name: "Circle holonomy toy model"
    kind: model
    symbol: "Holonomy(loop) -> phase"
    formal_definition: "A planned finite or bounded model that records phase accumulated around a loop, with source links to Hopf, bundle, winding, or gauge targets depending on the model."
    intuition: "Walking around a loop may return to the same visible place with different hidden phase; Circle Calculus should make that bookkeeping explicit."
    dependencies: ["COMMON-0007", "S3H-0002"]
    introduced_in: "PHASE7_PHYSICS_AND_GENERATORS"
    forbidden_meanings:
      - "A proof of Berry phase or Aharonov-Bohm physics."
      - "A full connection or curvature theory."
      - "A reason to collapse nontrivial bundles into products."
  - id: COMMON-0064
    name: "Minimal generator"
    kind: object
    symbol: "Generator(seed,rules,stop)"
    formal_definition: "A seed, finite rule set, and stopping or closure condition that regenerate a specified bounded Circle Calculus object under an explicit minimization criterion and search space."
    intuition: "Instead of storing only the finished object, store the smallest honest recipe that can rebuild it and explain where it came from."
    dependencies: ["COMMON-0042"]
    introduced_in: "PHASE7_PHYSICS_AND_GENERATORS"
    forbidden_meanings:
      - "An automatically optimal program."
      - "A Kolmogorov-complexity theorem."
      - "Evidence that smaller is always more meaningful."
  - id: COMMON-0065
    name: "Generative compression fixture"
    kind: experiment
    symbol: "generator_vs_explicit_fixture"
    formal_definition: "A planned deterministic fixture comparing explicit object descriptions with seed-plus-rule descriptions on bounded finite-circle, coil, orbit, or glyph artifacts, reporting exact regeneration, description length, proof coverage, and negative cases."
    intuition: "Test the reframing that useful compression is constructive generation: a compact seed is valuable only if it rebuilds, explains, and links to checks."
    dependencies: ["COMMON-0064", "COMMON-0066"]
    introduced_in: "PHASE7_PHYSICS_AND_GENERATORS"
    forbidden_meanings:
      - "Universal compression."
      - "A proof that the selected generator is minimal."
      - "A benchmark win without explicit object-only baselines and negative controls."
  - id: COMMON-0066
    name: "Seed-rule provenance"
    kind: interface
    symbol: "SeedRuleProvenance"
    formal_definition: "A planned provenance record that stores the seed, rule applications, iteration schedule, generated object, theorem ids, dictionary ids, source artifacts, and proof status for a generative Circle Calculus construction."
    intuition: "The generation history is part of the mathematical object when it helps a reader or checker rebuild the result."
    dependencies: ["COMMON-0042", "COMMON-0064"]
    introduced_in: "PHASE7_PHYSICS_AND_GENERATORS"
    forbidden_meanings:
      - "A substitute for a proof."
      - "A guarantee that the construction history is unique."
      - "A claim that generated artifacts are correct without parity tests or Lean theorem ids where formal claims are made."
