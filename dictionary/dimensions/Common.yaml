  - id: COMMON-0078
    name: "RoPE common-gap collision-pair count"
    kind: metric
    symbol: "collision_pairs_at_gap(context,gap)"
    formal_definition: "For a context length and positive common collision gap, the finite count `context - gap` of ordered starts whose paired position is exactly that gap ahead; in Lean, `Circle.Applications.ropeCollisionPairCountAtGap`, `Circle.Applications.ropePhaseBankCollision_at_gap_of_forall_dvd`, and `Circle.Applications.ropePhaseBankCollision_at_commonGap_mul_of_forall_dvd` certify that every counted start gives an all-channel collision when every declared period divides the gap or a positive in-context multiple of the common gap."
    intuition: "When a common exact collision gap lands inside the inspected context, the certifier can report not just one sample pair but theorem-backed counts of guaranteed pairs at that gap and at its in-context multiples."
    dependencies: ["COMMON-0076", "COMMON-0077"]
    introduced_in: "PAPER_AI_04_ROPE_POSITION_CERTIFIER"
    forbidden_meanings:
      - "The total number of every possible colliding pair beyond the common-gap multiple families unless a separate total-count theorem is cited."
      - "A real-valued RoPE collision count."
      - "Evidence that any model quality, context length, speed, or memory improves."
  - id: COMMON-0083
    name: "RoPE single-period collision-pair count"
    kind: metric
    symbol: "single_period_collision_pairs(context,period)"
    formal_definition: "For one positive integer-period RoPE channel, the ordered unequal pairs in a finite context that collide are exactly those whose positive position gap is a positive multiple of the period. Lean theorem `Circle.Applications.ropeDiscreteCollision_exists_positive_multiple_gap` proves the converse direction used by the executable formula that sums `context - multiple * period` over positive in-context multiples; `Circle.Applications.ropeDiscreteNoCollisionOnContext_iff_context_le_period`, `Circle.Applications.ropeDiscreteNoCollisionOnContext_iff_collisionPairCount_eq_zero`, and `Circle.Applications.ropeDiscreteCollisionPairCount_pos_iff_exists_collision` give the period/context threshold, zero-count, and positive-count witness semantics. `Circle.Applications.ropeCollisionPairCountAtGapMultiples_eq_single_gap_count` and `Circle.Applications.ropeCollisionPairCountAtGapMultiples_period_succ_eq_one` prove the first-repeat-only closed form and one-token-past-boundary count."
    intuition: "A single rotary channel repeats every period, so the exact single-channel collision count is the sum of all pairs separated by one period, two periods, three periods, and so on until the context ends. Zero means the context has not reached the repeat period; a positive count means there is a concrete repeated-position witness in that one channel. When the context reaches the first repeat but not the second, the count collapses to the first-gap count."
    dependencies: ["COMMON-0076", "COMMON-0077", "COMMON-0078"]
    introduced_in: "PAPER_AI_04_ROPE_POSITION_CERTIFIER"
    forbidden_meanings:
      - "An all-channel phase-bank collision count."
      - "A real-valued RoPE collision count."
      - "Evidence that any model quality, context length, speed, or memory improves."
  - id: COMMON-0084
    name: "RoPE period-bank LCM collision count"
    kind: metric
    symbol: "bank_collision_pairs(context,lcm(periods))"
    formal_definition: "For a finite integer-period RoPE bank, Lean theorem `Circle.Applications.ropePhaseBankCollision_iff_lcm_dvd_gap` proves that all-channel collision for ordered positions is equivalent to the period-bank LCM dividing the position gap. The executable total bank count therefore sums `context - multiple * lcm` over positive in-context multiples of that LCM. Theorem `Circle.Applications.not_ropePhaseBankCollision_of_lcm_ge_context` proves the pass case: if the LCM reaches the inspected context, no unequal ordered in-context all-channel collision exists. Theorems `Circle.Applications.ropePhaseBankCollision_at_lcm_gap` and `Circle.Applications.ropePhaseBankCollision_exists_of_lcm_pos_lt_context` prove the fail side: every counted start at the LCM gap collides, and a positive LCM below context yields an explicit unequal collision witness. `Circle.Applications.ropeCollisionPairCountAtGapMultiples_eq_single_gap_count` gives the reusable first-repeat-only count formula for LCM boundary reports."
    intuition: "All channels repeat together exactly at multiples of their shared period-bank LCM. If the first shared repeat is inside the context, the integer-model bank collision count is a finite sum over those repeats and the certifier has a checked sample-collision witness; if it is outside the context, the bank has no unequal in-context all-channel collision. Just past the first shared repeat, the count is exactly the number of starts before the context ends."
    dependencies: ["COMMON-0076", "COMMON-0077", "COMMON-0078", "COMMON-0083"]
    introduced_in: "PAPER_AI_04_ROPE_POSITION_CERTIFIER"
    forbidden_meanings:
      - "A real-valued RoPE collision count."
      - "A claim about model quality, context length, speed, memory, or perplexity."
      - "A count for undeclared or floating-point channels outside the integer-period bank model."
  - id: COMMON-0080
    name: "Unwrapped real RoPE phase gap"
    kind: model
    symbol: "|(right-left) * frequency|"
    formal_definition: "In Lean, `Circle.Applications.ropeRealPhaseGapAbs frequency left right` is the absolute unwrapped real-valued phase gap for one RoPE channel frequency. Theorems `ropeRealPhaseGapAbs_eq_natGap_mul_abs` and `ropeRealPhaseGapAbs_ge_minGap_mul_lower` give the exact natural-gap formula and a simple lower-bound precursor."
    intuition: "Before proving a circular modulo-full-turn RoPE margin theorem, the project first proves the real-valued gap arithmetic that any such theorem must use."
    dependencies: ["COMMON-0076", "COMMON-0077"]
    introduced_in: "PAPER_AI_04_ROPE_POSITION_CERTIFIER"
    forbidden_meanings:
      - "A circular distance modulo 2*pi."
      - "A completed Diophantine or continued-fraction RoPE margin theorem."
      - "Evidence that a real model has better context length, perplexity, speed, memory, or quality."
  - id: COMMON-0082
    name: "Real RoPE full-turn endpoint error"
    kind: model
    symbol: "|phase - turns * fullTurn|"
    formal_definition: "In Lean, `Circle.Applications.ropeRealPhaseNatTurnError frequency fullTurn left right turns` and `Circle.Applications.ropeRealPhaseIntTurnError frequency fullTurn left right turns` measure absolute distance between the nonnegative unwrapped one-channel phase magnitude and chosen full-turn multiples. Theorems `ropeRealPhaseNatTurnEndpointErrors_ge_margin_of_one_turn_window`, `ropeRealPhaseNatTurnError_ge_margin_of_one_turn_window`, and `ropeRealPhaseIntTurnError_ge_margin_of_one_turn_window` prove that if the phase lies inside one declared turn and is at least `margin` away from both endpoints, then endpoint errors, every nonnegative full-turn-multiple error, and every signed full-turn-multiple error are at least `margin`."
    intuition: "This is the first bridge from unwrapped real phase arithmetic toward circular margin reasoning: it proves the one-turn no-near-collision condition against all signed full-turn multiples without claiming the Diophantine theorem that arbitrary RoPE gaps satisfy the window hypotheses."
    dependencies: ["COMMON-0076", "COMMON-0077", "COMMON-0080"]
    introduced_in: "PAPER_AI_04_ROPE_POSITION_CERTIFIER"
    forbidden_meanings:
      - "A completed Diophantine or continued-fraction theorem proving arbitrary RoPE gaps satisfy the one-turn window hypotheses."
