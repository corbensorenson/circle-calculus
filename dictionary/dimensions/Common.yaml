entries:
  - id: COMMON-0001
    name: "Finite cell-count list"
    kind: object
    formal_definition: "A finite list whose i-th entry counts i-dimensional cells in a combinatorial model."
    intuition: "The bookkeeping vector behind Euler characteristic and suspension formulas."
    dependencies: []
    introduced_in: "D0 dimensional scaffolding"
    forbidden_meanings:
      - "A proof of geometric realization."
      - "A smooth manifold model."
  - id: COMMON-0002
    name: "Euler characteristic"
    kind: operation
    symbol: "chi"
    formal_definition: "The alternating sum of a finite cell-count list."
    intuition: "A dimension-sensitive count invariant for finite combinatorial models."
    dependencies: ["COMMON-0001"]
    introduced_in: "D0 dimensional scaffolding"
    forbidden_meanings:
      - "A homeomorphism classification by itself."
      - "A replacement for all topology."
  - id: COMMON-0003
    name: "Suspension cell-count transform"
    kind: operation
    symbol: "Susp"
    formal_definition: "The finite suspension count transform that adds two poles and cones each cell dimension to the next dimension."
    intuition: "The finite combinatorial move used to climb the sphere ladder."
    dependencies: ["COMMON-0001"]
    introduced_in: "D0 dimensional scaffolding"
    forbidden_meanings:
      - "A continuous suspension proof without a separate formal model."
      - "A picture of a suspension treated as a proof."
  - id: COMMON-0004
    name: "Double suspension Euler stabilizer"
    kind: operation
    symbol: "Susp^2"
    formal_definition: "The operation that applies the finite suspension cell-count transform twice, preserving Euler characteristic in the finite-count model."
    intuition: "The smallest stable-sphere seed in the current finite model: two suspension moves return the Euler characteristic to its starting value."
    dependencies: ["COMMON-0002", "COMMON-0003"]
    introduced_in: "PAPER_P2_01_STABLE_SPHERE_CALCULUS"
    forbidden_meanings:
      - "A proof of a general stable homotopy equivalence."
      - "A spectrum construction."
      - "A claim that all stable invariants are Euler characteristic."
  - id: COMMON-0005
    name: "Four suspension Euler stabilizer"
    kind: operation
    symbol: "Susp^4"
    formal_definition: "The operation that applies the finite double-suspension Euler stabilizer twice."
    intuition: "A first iterated stable-clock check: two double-suspension steps still preserve the finite Euler characteristic."
    dependencies: ["COMMON-0002", "COMMON-0003", "COMMON-0004"]
    introduced_in: "PAPER_P2_01_STABLE_SPHERE_CALCULUS"
    forbidden_meanings:
      - "Bott periodicity."
      - "A Clifford periodicity theorem."
      - "A statement about spectra without a separate formal model."
  - id: COMMON-0006
    name: "Period-eight dimension clock"
    kind: operation
    symbol: "dim mod 8"
    formal_definition: "The finite clock index dimension % 8 used as a bookkeeping layer for future Bott and Clifford periodicity work."
    intuition: "A safe way to talk about an eight-step dimension cycle before formalizing Clifford algebras or Bott periodicity."
    dependencies: []
    introduced_in: "PAPER_P2_02_BOTT_CLIFFORD_PERIODICITY"
    forbidden_meanings:
      - "A proof of Bott periodicity."
      - "A proof about real Clifford algebras."
      - "A K-theory or KO-theory theorem."
  - id: COMMON-0007
    name: "Trivial product bundle"
    kind: object
    symbol: "Base x Fiber"
    formal_definition: "A product object with a visible base coordinate and a fiber coordinate, modeled in Lean by Circle.Phase2.TrivialBundle."
    intuition: "The safe first bundle model: base and hidden fiber are tracked separately, without claiming any twisting."
    dependencies: []
    introduced_in: "PAPER_P2_03_BUNDLE_CALCULUS"
    forbidden_meanings:
      - "A proof that every bundle is globally trivial."
      - "A Hopf fibration formalization."
      - "A transition-function or connection model."
  - id: COMMON-0008
    name: "Bundle projection"
    kind: operation
    symbol: "pi"
    formal_definition: "The map that returns the base coordinate from the trivial product-bundle seed."
    intuition: "The visible part of a base/fiber state."
    dependencies: ["COMMON-0007"]
    introduced_in: "PAPER_P2_03_BUNDLE_CALCULUS"
    forbidden_meanings:
      - "A projection from an arbitrary bundle without a separate formal model."
      - "A quotient map."
  - id: COMMON-0009
    name: "Fiber coordinate"
    kind: operation
    symbol: "fiber"
    formal_definition: "The map that returns the fiber coordinate from the trivial product-bundle seed."
    intuition: "The hidden or phase-like part of a base/fiber state in the product model."
    dependencies: ["COMMON-0007"]
    introduced_in: "PAPER_P2_03_BUNDLE_CALCULUS"
    forbidden_meanings:
      - "A proof of fiber transport."
      - "A connection, curvature, holonomy, or transition-function model."
  - id: COMMON-0010
    name: "Directed interval"
    kind: object
    symbol: "[source -> target]"
    formal_definition: "A finite one-dimensional oriented interval with integer source and target coordinates."
    intuition: "The smallest boundary-calculus object: an oriented segment whose boundary is target minus source."
    dependencies: []
    introduced_in: "PAPER_P2_04_BOUNDARY_COBORDISM_CALCULUS"
    forbidden_meanings:
      - "A smooth manifold."
      - "A general chain complex."
      - "A cobordism theorem."
  - id: COMMON-0011
    name: "Boundary operator seed"
    kind: operation
    symbol: "boundary"
    formal_definition: "In the directed-interval seed, intervalBoundary maps an interval to target minus source, and pointBoundary maps zero-dimensional boundary chains to zero."
    intuition: "A tiny checked model of the boundary-after-boundary-is-zero slogan."
    dependencies: ["COMMON-0010"]
    introduced_in: "PAPER_P2_04_BOUNDARY_COBORDISM_CALCULUS"
    forbidden_meanings:
      - "A full singular, cellular, or simplicial boundary operator."
      - "A proof of homology theory."
      - "A physics boundary condition."
  - id: COMMON-0012
    name: "Interval orientation reversal"
    kind: operation
    symbol: "reverse"
    formal_definition: "The operation that swaps the source and target of a directed interval."
    intuition: "Turning an oriented segment around reverses the sign of its boundary."
    dependencies: ["COMMON-0010", "COMMON-0011"]
    introduced_in: "PAPER_P2_04_BOUNDARY_COBORDISM_CALCULUS"
    forbidden_meanings:
      - "A general orientation theorem."
      - "A cobordism equivalence."
  - id: COMMON-0013
    name: "Proof glyph certificate"
    kind: object
    symbol: "glyph -> theorem -> Lean"
    formal_definition: "A certificate record carrying a glyph id, theorem id, and Lean declaration name."
    intuition: "The smallest proof-carrying diagram contract: a visual object must point to formal identifiers."
    dependencies: []
    introduced_in: "PAPER_P2_05_PROOF_CARRYING_GLYPHS"
    forbidden_meanings:
      - "A proof by drawing alone."
      - "A rendered diagram with no theorem id."
      - "A normalized glyph language."
  - id: COMMON-0014
    name: "Glyph theorem-id projection"
    kind: operation
    symbol: "glyph.theorem_id"
    formal_definition: "The projection that reads the theorem id carried by a proof glyph certificate."
    intuition: "The paper can ask which theorem a glyph claims to represent."
    dependencies: ["COMMON-0013"]
    introduced_in: "PAPER_P2_05_PROOF_CARRYING_GLYPHS"
    forbidden_meanings:
      - "A proof that the theorem id is semantically correct."
      - "A theorem dependency graph."
  - id: COMMON-0015
    name: "Glyph Lean-name projection"
    kind: operation
    symbol: "glyph.lean_name"
    formal_definition: "The projection that reads the Lean declaration name carried by a proof glyph certificate."
    intuition: "The paper can ask which checked Lean declaration a glyph points to."
    dependencies: ["COMMON-0013"]
    introduced_in: "PAPER_P2_05_PROOF_CARRYING_GLYPHS"
    forbidden_meanings:
      - "A proof that the Lean declaration proves the intended semantic diagram."
      - "A rendered proof certificate."
  - id: COMMON-0016
    name: "Finite phase coordinate"
    kind: operation
    symbol: "phase(period, step)"
    formal_definition: "The residue step % period for a positive finite period."
    intuition: "The simplest coordinate for synthetic periodic data: where a sample lies inside its current cycle."
    dependencies: []
    introduced_in: "PAPER_APP_01_COIL_DATA_ANALYSIS"
    forbidden_meanings:
      - "A discovered period in real data."
      - "A Fourier transform."
      - "A benchmark result."
  - id: COMMON-0017
    name: "Phase closure"
    kind: relation
    symbol: "phase(step + period) = phase(step)"
    formal_definition: "The finite phase coordinate is unchanged after adding one positive period."
    intuition: "One full cycle returns a periodic coordinate to the same phase."
    dependencies: ["COMMON-0016"]
    introduced_in: "PAPER_APP_01_COIL_DATA_ANALYSIS"
    forbidden_meanings:
      - "A claim that an arbitrary dataset has this period."
      - "A noise-robust period detector."
  - id: COMMON-0018
    name: "Cyclic address"
    kind: operation
    symbol: "addr(size,index)"
    formal_definition: "The finite wraparound address index % size for a positive circular buffer size."
    intuition: "The proof-carrying address rewrite behind ring buffers, circular queues, and cyclic kernels."
    dependencies: []
    introduced_in: "PAPER_COMP_01_PROOF_CARRYING_CIRCULAR_COMPUTATION"
    forbidden_meanings:
      - "A memory-safety proof for an implementation language."
      - "A benchmark result."
      - "A cache-locality claim."
  - id: COMMON-0019
    name: "Cyclic address wraparound"
    kind: relation
    symbol: "addr(i + size) = addr(i)"
    formal_definition: "The cyclic address is unchanged after adding one positive circular buffer size."
    intuition: "A legal rewrite for circular computation: one full wrap returns to the same address."
    dependencies: ["COMMON-0018"]
    introduced_in: "PAPER_COMP_01_PROOF_CARRYING_CIRCULAR_COMPUTATION"
    forbidden_meanings:
      - "A proof that a backend is faster."
      - "A proof that arbitrary strided memory is coalesced."
  - id: COMMON-0020
    name: "Direction-bin schedule"
    kind: operation
    symbol: "bin(bin_count,sample)"
    formal_definition: "The finite schedule sample % bin_count for assigning samples or rays to direction bins."
    intuition: "A minimal checked address for ray queues, hemisphere samples, and spherical-coil buckets."
    dependencies: []
    introduced_in: "PAPER_COMP_02_COIL_RAY_AND_SAMPLING"
    forbidden_meanings:
      - "A spherical geometry proof."
      - "A BVH coherence theorem."
      - "A rendering benchmark result."
  - id: COMMON-0021
    name: "Direction-bin closure"
    kind: relation
    symbol: "bin(sample + bin_count) = bin(sample)"
    formal_definition: "The direction-bin schedule is unchanged after adding one positive bin count."
    intuition: "A finite queue/sampler schedule repeats after one full pass through the bins."
    dependencies: ["COMMON-0020"]
    introduced_in: "PAPER_COMP_02_COIL_RAY_AND_SAMPLING"
    forbidden_meanings:
      - "A proof that binning improves ray coherence."
      - "A statement about noise quality or visual convergence."
  - id: COMMON-0022
    name: "Stride address"
    kind: operation
    symbol: "addr(size,stride,step)"
    formal_definition: "The finite address (step * stride) % size for a circular stride schedule."
    intuition: "The address pattern behind orbit-order layout, periodic stencils, and finite transform passes."
    dependencies: ["COMMON-0018"]
    introduced_in: "PAPER_COMP_03_COIL_LAYOUT_STENCIL_NTT"
    forbidden_meanings:
      - "A proof of cache coalescing."
      - "A proof of FFT or NTT correctness."
      - "A claim that a layout is faster."
  - id: COMMON-0023
    name: "Stride schedule closure"
    kind: relation
    symbol: "addr(step + size) = addr(step)"
    formal_definition: "The finite stride address is unchanged after adding one full circular size to the step count."
    intuition: "A stride schedule repeats after one full pass through the circular step horizon."
    dependencies: ["COMMON-0022"]
    introduced_in: "PAPER_COMP_03_COIL_LAYOUT_STENCIL_NTT"
    forbidden_meanings:
      - "A proof of full traversal."
      - "A gcd-cycle decomposition theorem."
      - "A benchmark result."
  - id: COMMON-0024
    name: "Round-robin slot"
    kind: operation
    symbol: "slot(slot_count,tick)"
    formal_definition: "The finite schedule tick % slot_count for a positive number of scheduler slots."
    intuition: "A systems-facing cyclic schedule primitive for runtimes, queues, timers, and load rotation."
    dependencies: []
    introduced_in: "PAPER_COMP_04_COIL_SYSTEMS_APPLICATIONS"
    forbidden_meanings:
      - "A proof of scheduler fairness."
      - "A load-balancing theorem."
      - "A real-time systems guarantee."
  - id: COMMON-0025
    name: "Round-robin closure"
    kind: relation
    symbol: "slot(tick + slot_count) = slot(tick)"
    formal_definition: "The round-robin slot is unchanged after adding one positive slot count."
    intuition: "After a full pass through all slots, the schedule returns to the same slot."
    dependencies: ["COMMON-0024"]
    introduced_in: "PAPER_COMP_04_COIL_SYSTEMS_APPLICATIONS"
    forbidden_meanings:
      - "A starvation-freedom theorem."
      - "A throughput benchmark."
  - id: COMMON-0026
    name: "AI phase channel"
    kind: operation
    symbol: "phase_channel(period,position)"
    formal_definition: "The finite phase channel position % period for a positive AI phase period."
    intuition: "A simple periodic feature-index primitive for Circle AI architecture experiments."
    dependencies: []
    introduced_in: "PAPER_AI_01_CIRCLE_AI_ARCHITECTURES"
    forbidden_meanings:
      - "A proof of better model quality."
      - "A RoPE theorem."
      - "A learned representation guarantee."
  - id: COMMON-0027
    name: "AI phase-channel closure"
    kind: relation
    symbol: "phase_channel(position + period) = phase_channel(position)"
    formal_definition: "The AI phase channel is unchanged after adding one positive phase period."
    intuition: "A periodic feature-index returns to the same phase after one full period."
    dependencies: ["COMMON-0026"]
    introduced_in: "PAPER_AI_01_CIRCLE_AI_ARCHITECTURES"
    forbidden_meanings:
      - "A benchmark result."
      - "A claim that circles improve all AI."
  - id: COMMON-0028
    name: "Cyclic memory slot"
    kind: operation
    symbol: "memory_slot(bank_size,token)"
    formal_definition: "The finite memory-bank slot token % bank_size for a positive bank size."
    intuition: "A CoilKV-style cyclic address for memory-bank experiments."
    dependencies: []
    introduced_in: "PAPER_AI_02_COIL_ATTENTION_AND_MEMORY"
    forbidden_meanings:
      - "A retrieval-quality guarantee."
      - "A proof that cyclic memory replaces attention."
  - id: COMMON-0029
    name: "Cyclic memory-slot closure"
    kind: relation
    symbol: "memory_slot(token + bank_size) = memory_slot(token)"
    formal_definition: "The cyclic memory slot is unchanged after adding one positive bank size."
    intuition: "A token returns to the same memory slot after one full pass through a cyclic bank."
    dependencies: ["COMMON-0028"]
    introduced_in: "PAPER_AI_02_COIL_ATTENTION_AND_MEMORY"
    forbidden_meanings:
      - "A no-aliasing theorem."
      - "A long-context retrieval benchmark."
  - id: COMMON-0030
    name: "Adapter block index"
    kind: operation
    symbol: "adapter_block(block_size,channel)"
    formal_definition: "The finite adapter block channel % block_size for a positive block size."
    intuition: "A block/cyclic channel index for CoilRA and block-structured adapter experiments."
    dependencies: []
    introduced_in: "PAPER_AI_03_COILRA_AND_MULTICOIL_ROPE"
    forbidden_meanings:
      - "A LoRA replacement theorem."
      - "A parameter-efficiency benchmark."
      - "A hardware speedup claim."
  - id: COMMON-0031
    name: "Adapter block closure"
    kind: relation
    symbol: "adapter_block(channel + block_size) = adapter_block(channel)"
    formal_definition: "The adapter block index is unchanged after adding one positive block size."
    intuition: "A block-structured adapter index repeats after one full pass through the block."
    dependencies: ["COMMON-0030"]
    introduced_in: "PAPER_AI_03_COILRA_AND_MULTICOIL_ROPE"
    forbidden_meanings:
      - "A MultiCoil RoPE theorem."
      - "A model-quality benchmark."
  - id: COMMON-0032
    name: "Theorem metadata entry"
    kind: object
    symbol: "theorem metadata"
    formal_definition: "A finite metadata record carrying a theorem id and Lean declaration name, modeled by `Circle.Phase2.TheoremMetadata`."
    intuition: "The smallest source-of-truth object a proof glyph can resolve against."
    dependencies: ["COMMON-0014", "COMMON-0015"]
    introduced_in: "PAPER_P2_05_PROOF_CARRYING_GLYPHS"
    forbidden_meanings:
      - "A complete theorem manifest parser."
      - "A proof that the Lean declaration has the intended semantics."
  - id: COMMON-0033
    name: "Glyph manifest validity"
    kind: relation
    symbol: "glyph valid against manifest"
    formal_definition: "`Circle.Phase2.proofGlyphValidAgainst`, requiring a proof glyph's theorem id and Lean declaration name to match some theorem metadata entry."
    intuition: "A proof-carrying glyph must resolve to tracked theorem metadata before readers trust the interface."
    dependencies: ["COMMON-0013", "COMMON-0032"]
    introduced_in: "PAPER_P2_05_PROOF_CARRYING_GLYPHS"
    forbidden_meanings:
      - "A proof by diagram."
      - "A visual normal-form theorem."
  - id: COMMON-0034
    name: "Bundle transition seed"
    kind: operation
    symbol: "transition.apply"
    formal_definition: "`Circle.Phase2.BundleTransition`, a base-preserving fiber map over the trivial bundle seed."
    intuition: "The first checked transition-function boundary: fiber data may move while the visible base coordinate stays fixed."
    dependencies: ["COMMON-0007", "COMMON-0008", "COMMON-0009"]
    introduced_in: "PAPER_P2_03_BUNDLE_CALCULUS"
    forbidden_meanings:
      - "A nontrivial bundle atlas."
      - "A proof of Hopf fibration transition functions."
  - id: COMMON-0035
    name: "Bundle transition composition"
    kind: operation
    symbol: "transition.compose"
    formal_definition: "`Circle.Phase2.bundleTransitionCompose`, composing two base-preserving fiber maps in the trivial bundle seed."
    intuition: "A finite sanity law for future overlap/cocycle work."
    dependencies: ["COMMON-0034"]
    introduced_in: "PAPER_P2_03_BUNDLE_CALCULUS"
    forbidden_meanings:
      - "A general cocycle theorem."
      - "A connection, curvature, or holonomy theorem."
  - id: COMMON-0036
    name: "Synthetic period benchmark"
    kind: experiment
    symbol: "known_period_fixture"
    formal_definition: "`circle_math.applications.coil_data.benchmark_known_period`, a deterministic fixture with known-period synthetic signals and candidate period rankings."
    intuition: "A small benchmark harness for testing coil-period ideas before touching real data."
    dependencies: ["COMMON-0016", "COMMON-0017"]
    introduced_in: "PAPER_APP_01_COIL_DATA_ANALYSIS"
    forbidden_meanings:
      - "A real-data benchmark result."
      - "Evidence that coil signatures outperform baselines."
  - id: COMMON-0037
    name: "Coil closure error"
    kind: metric
    symbol: "closure_error(period)"
    formal_definition: "`circle_math.applications.coil_data.coil_closure_error`, the mean squared difference between a signal and itself shifted by a candidate period."
    intuition: "A simple closure profile score: lower error means the candidate period closes the sampled coil better."
    dependencies: ["COMMON-0036"]
    introduced_in: "PAPER_APP_01_COIL_DATA_ANALYSIS"
    forbidden_meanings:
      - "A formal proof of hidden periodicity."
      - "A universal period detector."
  - id: COMMON-0038
    name: "Autocorrelation period baseline"
    kind: metric
    symbol: "autocorr(lag)"
    formal_definition: "`circle_math.applications.coil_data.autocorrelation_score`, the normalized autocorrelation score for a candidate lag."
    intuition: "The ordinary baseline the coil closure profile must be compared against before usefulness claims."
    dependencies: ["COMMON-0036"]
    introduced_in: "PAPER_APP_01_COIL_DATA_ANALYSIS"
    forbidden_meanings:
      - "A proof that Fourier or periodogram methods are unnecessary."
      - "A benchmark without candidate-period controls."
  - id: COMMON-0039
    name: "Synthetic phase-channel benchmark"
    kind: experiment
    symbol: "phase_channel_fixture"
    formal_definition: "`circle_math.applications.circle_ai.run_phase_channel_benchmark`, a deterministic known-period binary-label fixture comparing a phase-channel lookup against a constant baseline, with optional MLX scoring when available."
    intuition: "A small smoke test that keeps AI phase-channel claims executable before moving to learned models."
    dependencies: ["COMMON-0026", "COMMON-0027"]
    introduced_in: "PAPER_AI_01_CIRCLE_AI_ARCHITECTURES"
    forbidden_meanings:
      - "A real model-quality result."
      - "A proof that phase channels improve neural networks."
      - "A replacement for standard AI baselines."
  - id: COMMON-0040
    name: "Coil layout validation grid"
    kind: experiment
    symbol: "layout_grid"
    formal_definition: "`circle_math.applications.coil_compute.validate_layout_grid`, a deterministic parameter grid checking natural, gcd-cycle, direct, and tiny dense circular-stride checksums agree."
    intuition: "A correctness harness for comparing layout orders before timing them."
    dependencies: ["COMMON-0022", "COMMON-0023"]
    introduced_in: "PAPER_COMP_03_COIL_LAYOUT_STENCIL_NTT"
    forbidden_meanings:
      - "A cache-locality proof."
      - "Evidence that gcd-cycle layout is faster."
      - "A replacement for FFT, NTT, dense, or direct baselines."
  - id: COMMON-0041
    name: "Finite-coil theorem signature index"
    kind: interface
    symbol: "coil_signature_index"
    formal_definition: "`circle_math.finite_search.build_s1_signature_index`, a bounded tag-to-theorem-id index for S1 finite-coil facts."
    intuition: "A small proof-navigation aid that groups finite-circle theorems by gcd, period, orbit count, full-coil, and same-orbit signatures."
    dependencies: ["CC-0205", "CC-0206", "CC-0207", "CC-0208"]
    introduced_in: "PAPER_01_FINITE_CIRCLES"
    forbidden_meanings:
      - "A general theorem prover."
      - "A proof-search speedup benchmark."
      - "Evidence of global theorem discovery."
  - id: COMMON-0042
    name: "Number provenance fixture"
    kind: interface
    symbol: "NumberProvenance(n)"
    formal_definition: "`circle_math.number_provenance.number_provenance`, a small finite-circle object recording divisors, factor pairs, stride views, and theorem-link views for a selected positive natural number."
    intuition: "Treat a number as a navigable construction space rather than only a value."
    dependencies: ["CC-0205", "CC-0207", "CC-0208", "COMMON-0041"]
    introduced_in: "PAPER_S1_04_FACTORS_SCALING_PRIME_COILS"
    forbidden_meanings:
      - "New arithmetic."
      - "A proof compression theorem."
      - "Evidence that provenance is always clearer than value-only notation."
  - id: COMMON-0043
    name: "Expanded periodic benchmark suite"
    kind: experiment
    symbol: "period_fixture_suite"
    formal_definition: "`circle_math.applications.coil_data.benchmark_period_fixture_suite`, deterministic clean, noisy, aliased, and multi-period synthetic fixtures reporting coil closure, autocorrelation, and periodogram-style baselines."
    intuition: "A small testbed for seeing where coil closure agrees with ordinary baselines and where ambiguity appears."
    dependencies: ["COMMON-0036", "COMMON-0037", "COMMON-0038"]
    introduced_in: "PAPER_APP_01_COIL_DATA_ANALYSIS"
    forbidden_meanings:
      - "A real-data benchmark."
      - "Evidence that coil closure beats periodogram or autocorrelation."
      - "A proof of hidden periodicity."
  - id: COMMON-0044
    name: "Learned phase baseline fixture"
    kind: experiment
    symbol: "learned_phase_baseline"
    formal_definition: "`circle_math.applications.circle_ai.run_learned_phase_baseline_benchmark`, a tiny deterministic comparison between a phase lookup and a learned scalar threshold baseline on periodic and nonperiodic synthetic controls."
    intuition: "A guardrail fixture: phase features should help only when phase structure is real, while ordinary features should win on nonperiodic controls."
    dependencies: ["COMMON-0026", "COMMON-0039"]
    introduced_in: "PAPER_AI_01_CIRCLE_AI_ARCHITECTURES"
    forbidden_meanings:
      - "A neural-network quality benchmark."
      - "Evidence that phase channels improve all AI."
      - "A replacement for dense, RoPE, attention, or state-space baselines."
  - id: COMMON-0045
    name: "Periodic stencil validation fixture"
    kind: experiment
    symbol: "periodic_stencil_fixture"
    formal_definition: "`circle_math.applications.coil_compute.validate_stencil_grid`, a deterministic periodic-boundary stencil fixture comparing direct natural-order, gcd-cycle layout-order, and tiny dense-matrix outputs."
    intuition: "A workload-specific correctness harness for checking that circular layout traversal preserves expected periodic-stencil outputs before timing or backend claims."
    dependencies: ["COMMON-0022", "COMMON-0040"]
    introduced_in: "PAPER_COMP_03_COIL_LAYOUT_STENCIL_NTT"
    forbidden_meanings:
      - "A cache-locality proof."
      - "Evidence that gcd-cycle layout is faster."
      - "A proof of FFT, NTT, or MLX backend correctness."
  - id: COMMON-0046
    name: "MultiCoil RoPE-style benchmark fixture"
    kind: experiment
    symbol: "multicoil_rope_fixture"
    formal_definition: "`circle_math.applications.circle_ai.run_multicoil_rope_benchmark`, a deterministic comparison between combined-period phase lookup, a single-period phase baseline, a scalar-threshold baseline, and a nonperiodic control."
