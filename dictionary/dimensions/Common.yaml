  - id: COMMON-0086
    name: "Real RoPE phase-bank near-turn contract"
    kind: relation
    symbol: "BankNearTurn(frequencies,fullTurn,tolerance,left,right)"
    formal_definition: "In Lean, `Circle.Applications.ropeRealPhaseBankNearTurn frequencies fullTurn tolerance left right` means every declared real-phase channel is near some signed full-turn multiple, while `Circle.Applications.ropeRealPhaseBankTurnSeparated frequencies fullTurn margin left right` means at least one declared channel is separated from every signed full-turn multiple by `margin`. Theorems `not_ropeRealPhaseBankNearTurn_of_bankTurnSeparated_lt` and `not_ropeRealPhaseBankNearTurn_of_one_channel_one_turn_window` prove that one separated channel rules out all-channel near-turn collision at any smaller tolerance."
    intuition: "The numerical scan looks for a best separating channel for each gap; this term is the formal bank-level contract shape behind that idea, without claiming the scan itself is proved."
    dependencies: ["COMMON-0076", "COMMON-0077", "COMMON-0080", "COMMON-0082", "COMMON-0085"]
