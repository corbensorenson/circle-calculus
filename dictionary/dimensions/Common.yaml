      - "Evidence that a real model has better context length, perplexity, speed, memory, or quality."
  - id: COMMON-0085
    name: "Real RoPE near-turn separation"
    kind: relation
    symbol: "TurnSeparated(frequency,fullTurn,margin,left,right)"
    formal_definition: "In Lean, `Circle.Applications.ropeRealPhaseTurnSeparated frequency fullTurn margin left right` means every signed full-turn error is at least `margin`; `Circle.Applications.ropeRealPhaseNearTurn frequency fullTurn tolerance left right` means some signed full-turn multiple is within `tolerance`. Theorems `ropeRealPhaseTurnSeparated_of_one_turn_window` and `not_ropeRealPhaseNearTurn_of_turnSeparated_lt` connect the one-turn-window precursor to a no-near-turn warning condition."
    intuition: "This turns the real-phase caveat into a precise contract shape: first prove a margin against every full turn, then the certifier may rule out smaller near-turn collisions."
    dependencies: ["COMMON-0076", "COMMON-0077", "COMMON-0080", "COMMON-0082"]
    introduced_in: "PAPER_AI_04_ROPE_POSITION_CERTIFIER"
    forbidden_meanings:
